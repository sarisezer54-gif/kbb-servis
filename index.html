function buildOrders(p){
  const pre=[],ex=[];let post;
  if(p.totallarenj)return{pre,post:[...LARENJ],ex};
  const kid=p.age!==null&&p.age<=12;
  if(kid){post=[...COCUK];if(p.tonsil)ex.push("Gasvin 1x1");if(p.kulak)ex.push("Zaridinex 3x5 (aynı gün)");return{pre,post,ex};}
  post=[...RUTIN];
  if(p.osas){pre.push("Lamelat 1x1");ex.push("Ramadex 100mg 1x1","Dengeli 1x1","Polgyl/Flagyl 3x1");}
  if(p.tonsil)ex.push("Gasvin");
  if(p.fess)post=post.map(x=>x.includes("Metadem")?"Paracerol 2x1":x);
  if(p.boyun)ex.push("Flagyl 3x1");
  if(p.acik)ex.push("Cipropol 2x1");
  if(p.kulak)ex.push("Zaridinex 3x5 (aynı gün)");
  if(p.tiroid||p.paratiroid)ex.push("Qalyviz 0.5mg 2x1","Calcimax 1x1");
  if(p.tiroid&&p.benign)ex.push("Levotiron 1x1");
  return{pre,post,ex};
}

function buildTasks(p){
  const t=["Yatış"];

  if(p.fotograf)t.push("Fotoğraf");
  if(p.rinomano)t.push("Rinomanometri");

  t.push("Ameliyat İsteği");
  t.push("Sabah Epikriz & Order");
  return t;
}

}

// State
let fbData=null,curDay=0,pendAlarm=null,pendAddDay=0;
const FB='nobet_30mart';
let noteTimer=null;
let typing=false;

function sdot(s){const d=document.getElementById('sdot');if(d)d.className='sdot '+s;}

function initFb(){
  sdot('wait');
  db.ref(FB).on('value',snap=>{
    const v=snap.val();
    if(v){
      fbData=v;
      if(!typing){renderAll();}
      sdot('ok');
    } else {
      const init={
        weekLabel:'30 Mart – 3 Nisan 2026',
        days:BASE.map(d=>({label:d.label,patients:d.patients.map(p=>({...p}))})),
        checks:BASE.map(d=>d.patients.map(p=>p.tasks.map(()=>false))),
        extraTasks:BASE.map(d=>d.patients.map(()=>[])),
        extraChecks:BASE.map(d=>d.patients.map(()=>[])),
        notes:BASE.map(d=>d.patients.map(()=>'')),
        alarms:BASE.map(d=>d.patients.map(()=>({}))),
        addedPatients:BASE.map(()=>[])
      };
      db.ref(FB).set(init).then(()=>{fbData=init;renderAll();sdot('ok');}).catch(()=>sdot('err'));
    }
  },()=>sdot('err'));
}

function getS(){return fbData||{weekLabel:'',days:BASE,checks:[],extraTasks:[],extraChecks:[],notes:[],alarms:[],addedPatients:[]};}
function cloneS(){return JSON.parse(JSON.stringify(getS()));}

function saveS(s){
  sdot('wait');
  db.ref(FB).set(s)
    .then(()=>sdot('ok'))
    .catch(()=>sdot('err'));
}

function getPts(di){
  const s=getS();
  const fbPts=(s.days&&s.days[di]&&s.days[di].patients)||null;
  const basePts=BASE[di]?BASE[di].patients:[];
  // Always use BASE length as reference for base patients
  const count=fbPts?Math.max(fbPts.length,basePts.length):basePts.length;
  const base=[];
  for(let i=0;i<(fbPts?fbPts.length:basePts.length);i++){
    const fb=fbPts?fbPts[i]||{}:{};
    const bp=basePts[i]||{};
    // Merge: BASE fields take priority for dr and muayene (always up to date)
    const c={...fb};
    c.dr=bp.dr||fb.dr||'';
    c.muayene=bp.muayene||fb.muayene||'';
    if(!c.name&&bp.name)c.name=bp.name;
    if(!c.op&&bp.op)c.op=bp.op;
    if(!c.tasks)c.tasks=buildTasks(c);
    base.push(c);
  }
  const added=((s.addedPatients||[])[di]||[]).map(p=>{const c={...p};if(!c.tasks)c.tasks=buildTasks(c);return c;});
  return [...base,...added];
}

// Stats for current day
function renderDayStats(di){
  const el=document.getElementById('day-stats');if(!el)return;
  const pts=getPts(di);
  const drC={};
  pts.forEach(p=>{if(p.dr)drC[p.dr]=(drC[p.dr]||0)+1;});
  let h='<span style="font-size:10px;color:#888780;margin-right:4px">Doktorlar:</span>';
  if(Object.keys(drC).length===0){h+='<span style="font-size:10px;color:#ccc">—</span>';}
  Object.entries(drC).sort((a,b)=>b[1]-a[1]).forEach(([dr,n])=>{
    h+=`<span class="spill">${dr} (${n})</span>`;
  });
  el.innerHTML=h;
}

function renderAll(){
  const s=getS();
  const dayList=s.days||BASE;
  document.getElementById('week-lbl').textContent=s.weekLabel||'30 Mart – 3 Nisan 2026';
  const tabsEl=document.getElementById('tabs');
  const daysEl=document.getElementById('days');
  tabsEl.innerHTML='';daysEl.innerHTML='';
  dayList.forEach((d,di)=>{
    const tab=document.createElement('div');
    tab.className='tab'+(di===curDay?' active':'');
    tab.textContent=d.label;tab.onclick=()=>switchDay(di);
    tabsEl.appendChild(tab);
    const div=document.createElement('div');
    div.id='day-'+di;div.className='day'+(di===curDay?' active':'');
    daysEl.appendChild(div);
    renderDay(di);
  });
  renderDayStats(curDay);
}

function renderDay(di){
  const s=getS();
  const pts=getPts(di);
  const basePts=(s.days&&s.days[di])?s.days[di].patients:BASE[di].patients;
  const baseCount=basePts.length;
  const el=document.getElementById('day-'+di);if(!el)return;
  const checks=(s.checks||[])[di]||[];
  const extraT=(s.extraTasks||[])[di]||[];
  const extraC=(s.extraChecks||[])[di]||[];
  const notes=(s.notes||[])[di]||[];
  const alarms=(s.alarms||[])[di]||[];

  let td=0,tt=0,pd=0,ybu=0;
  pts.forEach((p,i)=>{
    const pt=checks[i]||p.tasks.map(()=>false);
    const et=extraT[i]||[];const ec=extraC[i]||[];
    tt+=pt.length+et.length;
    const dn=pt.filter(Boolean).length+ec.filter(Boolean).length;
    td+=dn;
    if(dn===pt.length+et.length&&pt.length+et.length>0)pd++;
    if(p.ybu)ybu++;
  });

  let h=`<div class="sumrow">
    <div class="met"><div class="met-v">${td}</div><div class="met-l">tamamlanan</div></div>
    <div class="met"><div class="met-v">${tt}</div><div class="met-l">toplam görev</div></div>
    <div class="met"><div class="met-v">${pd}</div><div class="met-l">hazır hasta</div></div>
    <div class="met red"><div class="met-v">${ybu}</div><div class="met-l">YBÜ yeri</div></div>
  </div>`;

  if(ybu>0){
    const names=pts.filter(p=>p.ybu).map(p=>p.name.split(' ')[0]).join(', ');
    h+=`<div class="ybu-bar">🏥 ${ybu} YBÜ yeri: ${names}</div>`;
  }

  h+=`<div class="day-acts">
    <button class="dbtn add" onclick="openAddPt(${di})">+ Hasta Ekle</button>
    <button class="dbtn" onclick="resetDay(${di})">Günü Sıfırla</button>
  </div>`;

  pts.forEach((p,pi)=>{
    const pt=checks[pi]||p.tasks.map(()=>false);
    const et=extraT[pi]||[];const ec=extraC[pi]||[];
    const note=notes[pi]||'';const alarm=alarms[pi]||{};
    const dn=pt.filter(Boolean).length+ec.filter(Boolean).length;
    const total=pt.length+et.length;
    const allDone=dn===total&&total>0;
    const pct=total>0?Math.round(dn/total*100):0;
    const sc=p.side==='SOL'?'sol':p.side==='SAĞ'?'sag':'';
    const sb=p.side?`<span class="bdg ${sc}">${p.side}</span>`:'';
    const yb=p.ybu?'<span class="bdg ybu">Postop YBÜ</span>':'';
    const dc=drClass(p.dr||'');
    const db2=p.dr?`<span class="drbdg dr-${dc}">${p.dr}</span>`:'';

    h+=`<div class="card">
      <div class="card-head">
        <div class="card-info">
          <div><span class="cname" style="${allDone?'text-decoration:line-through;color:#888780':''}" onclick="openDet(${di},${pi})">${p.name||''}${p.age?', '+p.age:''}</span></div>
          <div class="cop">${p.op||''}</div>
          <div class="cmeta">${sb}${yb}${db2}</div>
        </div>
        <div style="display:flex;align-items:center;gap:4px">
          <span class="cnt">${dn}/${total}</span>
          <button class="delbtn" onclick="delPt(${di},${pi})">🗑</button>
        </div>
      </div>
      <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
      <div class="tasks">`;

    p.tasks.forEach((t,ti)=>{
      const ak='t_'+ti;const ha=alarm[ak];
      h+=`<div class="task${pt[ti]?' done':''}" onclick="toggleChk(${di},${pi},${ti})">
        <input type="checkbox" ${pt[ti]?'checked':''} onclick="event.stopPropagation();toggleChk(${di},${pi},${ti})">
        <label>${t}</label>
        ${ha?`<span class="atag" onclick="event.stopPropagation();openAlarm(${di},${pi},'${ak}','${t.replace(/'/g,"\\'")}')">⏰${ha}</span>`:''}
        <span class="aico" onclick="event.stopPropagation();openAlarm(${di},${pi},'${ak}','${t.replace(/'/g,"\\'")}')">🔔</span>
      </div>`;
    });
    h+=`</div>`;

    if(et.length>0){
      h+=`<div class="etasks">`;
      et.forEach((t,eti)=>{
        const ak='e_'+eti;const ha=alarm[ak];
        h+=`<div class="etask${ec[eti]?' done':''}">
          <input type="checkbox" ${ec[eti]?'checked':''} onclick="toggleEx(${di},${pi},${eti})">
          <label onclick="toggleEx(${di},${pi},${eti})">${t}</label>
          ${ha?`<span class="atag" onclick="openAlarm(${di},${pi},'${ak}','${t.replace(/'/g,"\\'")}')">⏰${ha}</span>`:''}
          <span class="aico" onclick="openAlarm(${di},${pi},'${ak}','${t.replace(/'/g,"\\'")}')">🔔</span>
          <span class="edel" onclick="delEx(${di},${pi},${eti})">×</span>
        </div>`;
      });
      h+=`</div>`;
    }

    h+=`<div class="addrow">
      <input class="addinp" type="text" id="nt-${di}-${pi}" placeholder="Ekstra görev ekle..." onkeydown="if(event.key==='Enter')addEx(${di},${pi})">
      <button class="addbtn" onclick="addEx(${di},${pi})">+</button>
    </div>`;

    const{pre,post,ex}=buildOrders(p);
    h+=`<div class="orders"><div class="otitle">Orderlar</div>`;
    if(pre.length){h+=`<div class="olbl">Preop:</div><div class="opills">`;pre.forEach(o=>{h+=`<span class="opill pre">${o}</span>`;});h+=`</div>`;}
    h+=`<div class="olbl">Postop 0. gün:</div><div class="opills">`;
    post.forEach(o=>{h+=`<span class="opill">${o}</span>`;});
    ex.forEach(o=>{h+=`<span class="opill ex">${o}</span>`;});
    h+=`</div></div>`;

    h+=`<textarea class="notarea" placeholder="Not ekle..." 
      onfocus="typing=true" 
      onblur="typing=false;flushNote(${di},${pi},this.value)"
      oninput="debouncedNote(${di},${pi},this.value)">${note}</textarea>`;
    h+=`</div>`;
  });

  el.innerHTML=h;
}

// Actions
function toggleChk(di,pi,ti){
  const s=cloneS();
  if(!s.checks[di])s.checks[di]=[];
  if(!s.checks[di][pi])s.checks[di][pi]=getPts(di)[pi].tasks.map(()=>false);
  s.checks[di][pi][ti]=!s.checks[di][pi][ti];
  saveS(s);
}

function toggleEx(di,pi,eti){
  const s=cloneS();
  if(!s.extraChecks[di][pi])s.extraChecks[di][pi]=[];
  s.extraChecks[di][pi][eti]=!s.extraChecks[di][pi][eti];
  saveS(s);
}

function addEx(di,pi){
  const inp=document.getElementById(`nt-${di}-${pi}`);
  const val=inp.value.trim();if(!val)return;
  const s=cloneS();
  if(!s.extraTasks[di][pi])s.extraTasks[di][pi]=[];
  if(!s.extraChecks[di][pi])s.extraChecks[di][pi]=[];
  s.extraTasks[di][pi].push(val);
  s.extraChecks[di][pi].push(false);
  saveS(s);
}

function delEx(di,pi,eti){
  const s=cloneS();
  s.extraTasks[di][pi].splice(eti,1);
  s.extraChecks[di][pi].splice(eti,1);
  saveS(s);
}

function debouncedNote(di,pi,val){
  clearTimeout(noteTimer);
  noteTimer=setTimeout(()=>flushNote(di,pi,val),2000);
}

function flushNote(di,pi,val){
  clearTimeout(noteTimer);
  const s=cloneS();
  if(!s.notes[di])s.notes[di]=[];
  s.notes[di][pi]=val;
  // Don't trigger re-render for notes
  sdot('wait');
  db.ref(FB+'/notes/'+di+'/'+pi).set(val).then(()=>sdot('ok')).catch(()=>sdot('err'));
}

function delPt(di,pi){
  if(!confirm('Bu hasta silinsin mi?'))return;
  const s=cloneS();
  const basePts=(s.days&&s.days[di])?s.days[di].patients:BASE[di].patients;
  if(pi<basePts.length){
    if(!s.days[di])s.days[di]={label:BASE[di].label,patients:BASE[di].patients.map(p=>({...p}))};
    s.days[di].patients.splice(pi,1);
  } else {
    if(s.addedPatients[di])s.addedPatients[di].splice(pi-basePts.length,1);
  }
  if(s.checks[di])s.checks[di].splice(pi,1);
  if(s.extraTasks[di])s.extraTasks[di].splice(pi,1);
  if(s.extraChecks[di])s.extraChecks[di].splice(pi,1);
  if(s.notes[di])s.notes[di].splice(pi,1);
  if(s.alarms[di])s.alarms[di].splice(pi,1);
  saveS(s);
}

function resetDay(di){
  if(!confirm('Bu günün tikleri sıfırlansın mı?'))return;
  const s=cloneS();
  const bp=(s.days&&s.days[di])?s.days[di].patients:BASE[di].patients;
  // Reset checks to all false
  s.checks[di]=bp.map(p=>{
    const c={...p};if(!c.tasks)c.tasks=buildTasks(c);
    return c.tasks.map(()=>false);
  });
  // Reset extra checks to false (keep extra tasks)
  if(s.extraChecks[di])s.extraChecks[di]=s.extraChecks[di].map(arr=>(arr||[]).map(()=>false));
  saveS(s);
}

function switchDay(di){
  curDay=di;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===di));
  document.querySelectorAll('.day').forEach((d,i)=>d.classList.toggle('active',i===di));
  renderDayStats(di);
}

// Alarm
function openAlarm(di,pi,key,taskName){
  pendAlarm={di,pi,key};
  document.getElementById('al-task').value=taskName;
  document.getElementById('al-day').value=di;
  const ex=((getS().alarms||[])[di]||[])[pi]||{};
  document.getElementById('al-time').value=ex[key]||'';
  openOv('alarm-ov');
}

function saveAlarm(){
  if(!pendAlarm)return;
  const{di,pi,key}=pendAlarm;
  const time=document.getElementById('al-time').value;
  const day=parseInt(document.getElementById('al-day').value);
  if(!time){alert('Lütfen saat seçin.');return;}
  const s=cloneS();
  if(!s.alarms[day])s.alarms[day]=[];
  if(!s.alarms[day][pi])s.alarms[day][pi]={};
  s.alarms[day][pi][key]=time;
  saveS(s);
  schedNotif(day,pi,key,time);
  closeOv('alarm-ov');
}

function clearAlarm(){
  if(!pendAlarm)return;
  const{di,pi,key}=pendAlarm;
  const s=cloneS();
  if(s.alarms[di]&&s.alarms[di][pi])delete s.alarms[di][pi][key];
  saveS(s);closeOv('alarm-ov');
}

function schedNotif(di,pi,key,time){
  if(Notification.permission!=='granted')return;
  const[h,m]=time.split(':').map(Number);
  const now=new Date(),target=new Date();
  target.setHours(h,m,0,0);
  if(target<=now)target.setDate(target.getDate()+1);
  const p=getPts(di)[pi];
  const s=getS();
  const tname=key.startsWith('t_')?p.tasks[parseInt(key.slice(2))]:((s.extraTasks[di]||[])[pi]||[])[parseInt(key.slice(2))]||'';
  setTimeout(()=>{try{new Notification('KBB — '+p.name,{body:tname,icon:'./icon-192.png'});}catch(e){}},target-now);
}

// Add patient
function openAddPt(di){
  pendAddDay=di;
  ['np-ad','np-op','np-dr'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('np-yas').value='';
  document.getElementById('np-side').value='';
  ['np-ybu','np-kayit','np-foto','np-rino','np-lavaj','np-kulak','np-osas','np-tonsil','np-fess','np-boyun','np-acik','np-tiroid','np-para','np-benign','np-larenj'].forEach(id=>document.getElementById(id).checked=false);
  openOv('add-ov');
}

function saveNewPt(){
  const name=document.getElementById('np-ad').value.trim();
  const op=document.getElementById('np-op').value.trim();
  if(!name||!op){alert('Ad ve ameliyat zorunludur.');return;}
  const sv=document.getElementById('np-side').value;
  const p={name,op,dr:document.getElementById('np-dr').value.trim().toUpperCase()||null,age:parseInt(document.getElementById('np-yas').value)||null,side:sv||null,ybu:document.getElementById('np-ybu').checked,kayit:document.getElementById('np-kayit').checked,fotograf:document.getElementById('np-foto').checked,rinomano:document.getElementById('np-rino').checked,lavaj:document.getElementById('np-lavaj').checked,isaret:!!sv,kulak:document.getElementById('np-kulak').checked,osas:document.getElementById('np-osas').checked,tonsil:document.getElementById('np-tonsil').checked,fess:document.getElementById('np-fess').checked,boyun:document.getElementById('np-boyun').checked,acik:document.getElementById('np-acik').checked,tiroid:document.getElementById('np-tiroid').checked,paratiroid:document.getElementById('np-para').checked,benign:document.getElementById('np-benign').checked,totallarenj:document.getElementById('np-larenj').checked,muayene:''};
  p.tasks=buildTasks(p);
  const s=cloneS();
  if(!s.addedPatients[pendAddDay])s.addedPatients[pendAddDay]=[];
  s.addedPatients[pendAddDay].push(p);
  s.checks[pendAddDay].push(p.tasks.map(()=>false));
  s.extraTasks[pendAddDay].push([]);
  s.extraChecks[pendAddDay].push([]);
  s.notes[pendAddDay].push('');
  s.alarms[pendAddDay].push({});
  saveS(s);closeOv('add-ov');
}

// Detail
function openDet(di,pi){
  const p=getPts(di)[pi];
  document.getElementById('det-name').textContent=(p.name||'')+(p.age?', '+p.age:'')+(p.dr?' — '+p.dr:'');
  document.getElementById('det-op').textContent=p.op||'';
  document.getElementById('det-muayene').textContent=p.muayene||'—';
  openOv('det-ov');
}

// PDF
async function handlePdf(event){
  const file=event.target.files[0];if(!file)return;
  const st=document.getElementById('pdfst');
  st.style.display='block';st.className='pst loading';st.textContent='PDF okunuyor...';
  try{
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=()=>rej(new Error('Okunamadı'));r.readAsDataURL(file);});
    document.getElementById('loadtxt').textContent='Ameliyat listesi oluşturuluyor...';
    document.getElementById('loadov').classList.add('open');
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:6000,messages:[{role:'user',content:[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:'Bu KBB ameliyat listesi PDF\'inden hasta listesini çıkar. SADECE JSON döndür, başka hiçbir şey yazma.\n\nKurallar:\n- Timpanoplasti/Miringoplasti/DSR/DL/Tiroid/Paratiroid/Boyun dis/LAP → kayit:true\n- Açık teknik septoplasti → fotograf:true, rinomano:true, acik:true\n- Standart septoplasti → rinomano:true\n- DSR → lavaj:true\n- Kulak ameliyatı → kulak:true\n- OSAS/Uyku cerrahisi → osas:true\n- Tonsillektomi → tonsil:true\n- FESS → fess:true\n- Boyun diseksiyonu → boyun:true\n- Tiroid → tiroid:true (malign ise benign:false, benign ise benign:true)\n- Paratiroid → paratiroid:true\n- Total larenjektomi → totallarenj:true\n- Sağ/Sol → side:"SAĞ"/"SOL", isaret:true\n- Postop YBÜ → ybu:true\n- dr: PDF\'deki doktor kısaltması (son sütun)\n- muayene: PDF\'deki muayene/tetkik notlarının tamamı\n\nJSON format:\n{"weekLabel":"30 Mart - 3 Nisan 2026","days":[{"label":"Pzt 30/3","patients":[{"name":"Ad Soyad","age":32,"dr":"FÖ","op":"Ameliyat adı","side":"SOL","ybu":false,"kayit":true,"fotograf":false,"rinomano":false,"lavaj":false,"isaret":true,"kulak":true,"osas":false,"tonsil":false,"fess":false,"boyun":false,"acik":false,"tiroid":false,"paratiroid":false,"benign":false,"totallarenj":false,"muayene":"Muayene notları buraya"}]}]}'}]}]})});
    const data=await resp.json();
    const text=data.content.map(c=>c.text||'').join('');
    const clean=text.replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(clean);
    parsed.days.forEach(d=>d.patients.forEach(p=>{p.tasks=buildTasks(p);}));
    const ns={weekLabel:parsed.weekLabel,days:parsed.days,checks:parsed.days.map(d=>d.patients.map(p=>p.tasks.map(()=>false))),extraTasks:parsed.days.map(d=>d.patients.map(()=>[])),extraChecks:parsed.days.map(d=>d.patients.map(()=>[])),notes:parsed.days.map(d=>d.patients.map(()=>'')),alarms:parsed.days.map(d=>d.patients.map(()=>({}))),addedPatients:parsed.days.map(()=>[])};
    db.ref(FB).set(ns).then(()=>{
      document.getElementById('loadov').classList.remove('open');
      st.className='pst ok';
      st.textContent='✓ '+parsed.weekLabel+' oluşturuldu! '+parsed.days.reduce((a,d)=>a+d.patients.length,0)+' hasta.';
      curDay=0;closeOv('pdf-ov');
    }).catch(e=>{document.getElementById('loadov').classList.remove('open');st.className='pst err';st.textContent='Kayıt hatası: '+e.message;});
  }catch(e){document.getElementById('loadov').classList.remove('open');st.className='pst err';st.textContent='Hata: '+e.message;}
  event.target.value='';
}

function openOv(id){document.getElementById(id).classList.add('open');}
function closeOv(id){document.getElementById(id).classList.remove('open');pendAlarm=null;}
function reqNotif(){
  if(!('Notification'in window)){alert('Bildirim desteklenmiyor.');return;}
  Notification.requestPermission().then(p=>alert(p==='granted'?'Bildirim izni verildi!':'Reddedildi.'));
}

if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
renderAll();
initFb();
</script>
