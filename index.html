<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a18">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>KBB Servis</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a18;min-height:100vh;padding-bottom:80px}
.hdr{padding:.85rem 1rem .5rem;background:#1a1a18;display:flex;align-items:center;justify-content:space-between}
.hdr-t{color:#fff;font-size:15px;font-weight:600}
.hdr-s{color:rgba(255,255,255,.4);font-size:10px;margin-top:1px}
.sd{width:7px;height:7px;border-radius:50%;background:#888;display:inline-block;margin-right:5px;transition:background .3s}
.sd.on{background:#1d9e75}.sd.wait{background:#f0a500}.sd.err{background:#e24b4a}
.hbtn{font-size:11px;padding:5px 9px;border:.5px solid rgba(255,255,255,.3);border-radius:8px;background:transparent;cursor:pointer;color:#fff}
.sbar{padding:7px 1rem;background:#fff;border-bottom:.5px solid rgba(0,0,0,.08);display:flex;gap:8px;align-items:center}
.sinp{flex:1;font-size:13px;padding:6px 10px;border:.5px solid rgba(0,0,0,.12);border-radius:8px;background:#f9f9f7;font-family:inherit;color:#1a1a18;outline:none}
.drstats{padding:6px 1rem;background:#fff;border-bottom:.5px solid rgba(0,0,0,.08);display:flex;gap:5px;flex-wrap:wrap;align-items:center;min-height:30px}
.spill{font-size:10px;padding:2px 8px;border-radius:20px;background:#f0f0ee;color:#3a3a38;border:.5px solid rgba(0,0,0,.08);font-weight:500}
.tabs{display:flex;overflow-x:auto;border-bottom:.5px solid rgba(0,0,0,.1);scrollbar-width:none;background:#fff}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:9px 13px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;color:#5f5e5a;white-space:nowrap}
.tab.active{color:#1a1a18;border-bottom-color:#1a1a18;font-weight:500}
.day{display:none;padding:.75rem 1rem 1rem}.day.active{display:block}
.sumrow{display:flex;gap:6px;margin-bottom:8px}
.met{background:#ebebea;border-radius:8px;padding:8px 10px;flex:1}
.met-v{font-size:18px;font-weight:500}.met-l{font-size:10px;color:#5f5e5a;margin-top:1px}
.met.red{background:#fcebeb}.met.red .met-v,.met.red .met-l{color:#a32d2d}
.met.grey{background:#f0f0ee}.met.grey .met-v{color:#888;font-size:16px}.met.grey .met-l{color:#aaa}
.ybubar{background:#fcebeb;border:.5px solid rgba(163,45,45,.2);border-radius:8px;padding:7px 12px;margin-bottom:10px;font-size:12px;color:#a32d2d}
.dayacts{display:flex;gap:8px;margin-bottom:12px}
.dbtn{font-size:12px;padding:7px 12px;border:.5px solid rgba(0,0,0,.2);border-radius:8px;background:#fff;cursor:pointer;color:#1a1a18;flex:1}
.dbtn.add{background:#1a1a18;color:#fff;border:none}
.card{background:#fff;border:.5px solid rgba(0,0,0,.12);border-radius:12px;margin-bottom:10px;overflow:hidden}
.card.cx{opacity:.55;border-style:dashed}
.chead{display:flex;align-items:flex-start;gap:8px;padding:10px 12px 5px}
.cinfo{flex:1;min-width:0}
.cname{font-size:14px;font-weight:500;cursor:pointer;color:#1a1a18;background:none;border:none;padding:0;text-align:left;font-family:inherit;display:block;width:100%}
.cop{font-size:11px;color:#5f5e5a;margin-top:2px}
.cmeta{display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap}
.bdg{font-size:10px;padding:2px 7px;border-radius:8px}
.bdg.sol{background:#e6f1fb;color:#185fa5}.bdg.sag{background:#faeeda;color:#854f0b}
.bdg.ybu{background:#fcebeb;color:#a32d2d}
.bdg.hb{background:#fde8e8;color:#c0392b;border:.5px solid rgba(192,57,43,.3);font-weight:500}
.bdg.cx{background:#f0f0ee;color:#888}
.drbdg{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:500}
.dr-FÖ,.dr-FO{background:#f3e5f5;color:#6a1b9a}
.dr-SÇ,.dr-SC{background:#e8f5e9;color:#1b5e20}
.dr-SG{background:#e3f2fd;color:#0d47a1}
.dr-HEÖ,.dr-HEO{background:#fce4ec;color:#880e4f}
.dr-SŞE,.dr-SSE{background:#fff3e0;color:#e65100}
.dr-EK{background:#e0f2f1;color:#004d40}
.dr-RG{background:#f1f8e9;color:#33691e}
.dr-HB{background:#fff8e1;color:#f57f17}
.dr-GKÇ,.dr-GKC{background:#e1f5fe;color:#01579b}
.dr-MSG{background:#fbe9e7;color:#bf360c}
.dr-other{background:#f5f5f5;color:#616161}
.cbtn{font-size:11px;color:#bbb;cursor:pointer;padding:0 3px;border:none;background:transparent;flex-shrink:0}
.delbtn{font-size:12px;color:#ddd;cursor:pointer;padding:0 3px;border:none;background:transparent;flex-shrink:0}
.movebtn{font-size:12px;color:#bbb;cursor:pointer;padding:0 3px;border:none;background:transparent;flex-shrink:0}
.cnt{font-size:11px;color:#5f5e5a;flex-shrink:0;margin-top:1px}
.pbar{height:3px;background:rgba(0,0,0,.07);margin:0 12px 7px;border-radius:2px}
.pfill{height:100%;background:#1d9e75;border-radius:2px;transition:width .3s}
.tasks{padding:0 12px 7px;display:flex;flex-wrap:wrap;gap:6px}
.task{display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none}
.task input[type=checkbox]{width:15px;height:15px;accent-color:#1d9e75;cursor:pointer;flex-shrink:0}
.task label{font-size:12px;cursor:pointer}
.task.done label{text-decoration:line-through;color:#888780}
.atag{font-size:10px;color:#854f0b;background:#fff3e0;padding:1px 5px;border-radius:4px;cursor:pointer;margin-left:2px}
.aico{font-size:11px;color:#ccc;cursor:pointer;margin-left:1px}
.etasks{padding:0 12px 5px}
.etask{display:flex;align-items:center;gap:4px;margin-bottom:4px}
.etask input[type=checkbox]{width:15px;height:15px;accent-color:#1d9e75;flex-shrink:0}
.etask label{font-size:12px;flex:1;cursor:pointer}
.etask.done label{text-decoration:line-through;color:#888780}
.edel{font-size:14px;color:#ddd;cursor:pointer;padding:0 4px;background:none;border:none}
.addrow{display:flex;gap:6px;margin:0 12px 7px}
.addinp{flex:1;font-size:12px;padding:6px 8px;border:.5px solid rgba(0,0,0,.15);border-radius:8px;background:#fff;font-family:inherit;color:#1a1a18}
.addbtn{font-size:12px;padding:6px 10px;border:none;border-radius:8px;background:#1d9e75;color:#fff;cursor:pointer;font-weight:500}
.orders{margin:0 12px 7px;border-top:.5px solid rgba(0,0,0,.07);padding-top:6px}
.otitle{font-size:10px;font-weight:500;color:#5f5e5a;margin-bottom:3px}
.olbl{font-size:10px;color:#888780;margin-bottom:2px;margin-top:3px}
.opills{display:flex;flex-wrap:wrap;gap:3px}
.opill{font-size:10px;padding:2px 7px;border-radius:20px;background:#f0f0ee;color:#3a3a38;border:.5px solid rgba(0,0,0,.08)}
.opill.ex{background:#eaf3de;color:#3b6d11}.opill.pre{background:#e6f1fb;color:#185fa5}
.note-wrap{padding:0 12px 10px}
.notarea{background:#fffef5;border:.5px solid rgba(0,0,0,.1);border-radius:8px;padding:8px;font-size:12px;color:#3a3a38;width:100%;min-height:44px;resize:vertical;font-family:inherit;display:block}
.notarea::placeholder{color:#aaa}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
.ov.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:1.25rem;width:calc(100% - 2rem);max-width:520px;max-height:88vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:500;margin-bottom:.75rem}
.mlbl{font-size:12px;color:#5f5e5a;display:block;margin-bottom:3px;margin-top:10px}
.modal input[type=time],.modal input[type=text],.modal input[type=number],.modal select{width:100%;padding:8px 10px;border:.5px solid rgba(0,0,0,.2);border-radius:8px;font-size:14px;margin-bottom:4px;font-family:inherit;background:#fff;color:#1a1a18}
.mchkrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.mchk{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer}
.mchk input{width:15px;height:15px;accent-color:#1d9e75}
.mbtns{display:flex;gap:8px;margin-top:12px}
.mbtn{flex:1;padding:10px;border-radius:8px;font-size:14px;cursor:pointer;border:none;font-family:inherit}
.mbtn.ok{background:#1d9e75;color:#fff}.mbtn.no{background:#f0f0ee;color:#3a3a38}.mbtn.del{background:#fcebeb;color:#a32d2d}
.dettxt{font-size:12px;line-height:1.6;background:#f9f9f7;border-radius:8px;padding:10px;white-space:pre-wrap;color:#1a1a18;margin-top:6px}
.lscrn{display:none;position:fixed;inset:0;z-index:999;align-items:center;justify-content:center;background:#1a1a18}
.lscrn.show{display:flex}
.lbox{background:#fff;border-radius:16px;padding:2rem 1.5rem;width:calc(100% - 3rem);max-width:360px;text-align:center}
.lbox h2{font-size:20px;font-weight:600;margin-bottom:2px}
.lsub{font-size:11px;color:#aaa;margin-bottom:2px}
.ldesc{font-size:13px;color:#888780;margin-bottom:1.5rem}
.linp{width:100%;padding:10px 12px;border:.5px solid rgba(0,0,0,.2);border-radius:10px;font-size:15px;font-family:inherit;color:#1a1a18;margin-bottom:10px;display:block}
.linp:focus{outline:none;border-color:#1a1a18}
.lbtn{width:100%;padding:12px;background:#1a1a18;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit}
.lerr{font-size:12px;color:#e24b4a;margin-top:8px;min-height:18px}
.ldov{display:none;position:fixed;inset:0;background:rgba(255,255,255,.9);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.ldov.open{display:flex}
.spin{width:32px;height:32px;border:3px solid #ebebea;border-top-color:#1d9e75;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="lscrn" id="lscrn">
  <div class="lbox">
    <div style="font-size:32px;margin-bottom:8px">🏥</div>
    <h2>KBB Servis</h2>
    <div class="lsub">KOCAELİ ŞEHİR HASTANESİ</div>
    <div class="ldesc" style="margin-top:8px">Giriş yapın</div>
    <input class="linp" type="text" id="lu" placeholder="Kullanıcı adı" autocapitalize="none" autocorrect="off" spellcheck="false">
    <input class="linp" type="password" id="lp" placeholder="Şifre">
    <button class="lbtn" id="lbtn">Giriş Yap</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<div class="hdr">
  <div>
    <div class="hdr-t"><span class="sd" id="sd"></span>KBB Servis</div>
    <div class="hdr-s">KOCAELİ ŞEHİR HASTANESİ</div>
  </div>
  <button class="hbtn" onclick="reqNotif()">🔔 İzin</button>
</div>
<div class="sbar">
  <input class="sinp" type="text" id="sinp" placeholder="Hasta adı, doktor veya ameliyat ara...">
  <button id="sclr" style="display:none;font-size:16px;color:#aaa;background:none;border:none;cursor:pointer" onclick="clearSearch()">✕</button>
</div>
<div class="drstats" id="drstats"></div>
<div class="tabs" id="tabs"></div>
<div id="days"></div>
<div class="ldov" id="ldov"><div class="spin"></div><div style="font-size:13px;color:#5f5e5a">Yükleniyor...</div></div>

<!-- Alarm -->
<div class="ov" id="alarm-ov">
  <div class="modal">
    <h3>⏰ Hatırlatıcı</h3>
    <span class="mlbl">Görev</span><input type="text" id="al-task" readonly style="background:#f9f9f7;font-size:12px">
    <span class="mlbl">Gün</span><select id="al-day"></select>
    <span class="mlbl">Saat</span><input type="time" id="al-time">
    <p id="al-warn" style="font-size:11px;color:#e65100;margin-top:4px;display:none">⚠️ Önce 🔔 İzin butonuna basın.</p>
    <div class="mbtns">
      <button class="mbtn no" onclick="closeOv('alarm-ov')">İptal</button>
      <button class="mbtn del" onclick="clearAlarm()">Sil</button>
      <button class="mbtn ok" onclick="saveAlarm()">Kaydet</button>
    </div>
  </div>
</div>

<!-- Add Patient -->
<div class="ov" id="add-ov">
  <div class="modal">
    <h3>Hasta Ekle</h3>
    <span class="mlbl">Ad Soyad *</span><input type="text" id="np-ad">
    <span class="mlbl">Yaş</span><input type="number" id="np-yas" min="0" max="120">
    <span class="mlbl">Ameliyat *</span><input type="text" id="np-op">
    <span class="mlbl">Doktor</span><input type="text" id="np-dr" placeholder="FÖ, SÇ, EK...">
    <span class="mlbl">Taraf</span>
    <select id="np-side"><option value="">Yok</option><option value="SAĞ">SAĞ</option><option value="SOL">SOL</option></select>
    <span class="mlbl">Özellikler</span>
    <div class="mchkrow">
      <label class="mchk"><input type="checkbox" id="np-ybu"> YBÜ</label>
      <label class="mchk"><input type="checkbox" id="np-hbsag"> HBsAg+</label>
      <label class="mchk"><input type="checkbox" id="np-kayit"> Kayıt</label>
      <label class="mchk"><input type="checkbox" id="np-yfodyo"> YF Odyo</label>
      <label class="mchk"><input type="checkbox" id="np-muller"> Müller</label>
      <label class="mchk"><input type="checkbox" id="np-foto"> Fotoğraf</label>
      <label class="mchk"><input type="checkbox" id="np-rino"> Rinomano</label>
      <label class="mchk"><input type="checkbox" id="np-lavaj"> Lavaj</label>
      <label class="mchk"><input type="checkbox" id="np-kulak"> Kulak Am.</label>
      <label class="mchk"><input type="checkbox" id="np-osas"> OSAS</label>
      <label class="mchk"><input type="checkbox" id="np-tonsil"> Tonsil</label>
      <label class="mchk"><input type="checkbox" id="np-fess"> FESS</label>
      <label class="mchk"><input type="checkbox" id="np-boyun"> Boyun</label>
      <label class="mchk"><input type="checkbox" id="np-acik"> Açık Teknik</label>
      <label class="mchk"><input type="checkbox" id="np-tiroid"> Tiroid</label>
      <label class="mchk"><input type="checkbox" id="np-para"> Paratiroid</label>
      <label class="mchk"><input type="checkbox" id="np-benign"> Benign Tiroid</label>
      <label class="mchk"><input type="checkbox" id="np-larenj"> Total Larenj.</label>
    </div>
    <div class="mbtns">
      <button class="mbtn no" onclick="closeOv('add-ov')">İptal</button>
      <button class="mbtn ok" onclick="saveNewPt()">Ekle</button>
    </div>
  </div>
</div>

<!-- Move -->
<div class="ov" id="move-ov">
  <div class="modal">
    <h3>Hastayı Taşı</h3>
    <div id="move-info" style="font-size:13px;color:#5f5e5a;margin-bottom:12px"></div>
    <span class="mlbl">Hangi güne?</span><select id="move-day"></select>
    <div class="mbtns">
      <button class="mbtn no" onclick="closeOv('move-ov')">İptal</button>
      <button class="mbtn ok" onclick="confirmMove()">Taşı</button>
    </div>
  </div>
</div>

<!-- Detail -->
<div class="ov" id="det-ov">
  <div class="modal">
    <h3 id="det-name"></h3>
    <div id="det-op" style="font-size:12px;color:#5f5e5a"></div>
    <div style="font-size:11px;font-weight:500;color:#5f5e5a;margin-top:12px;text-transform:uppercase;letter-spacing:.04em">Muayene Notu</div>
    <div class="dettxt" id="det-txt">—</div>
    <div class="mbtns"><button class="mbtn no" onclick="closeOv('det-ov')">Kapat</button></div>
  </div>
</div>

<script>
// ── Firebase REST ────────────────────────────────────────────
const FBU='https://kbb-servis-default-rtdb.firebaseio.com';
const FBP='kbb2026';
async function fbGet(){const r=await fetch(FBU+'/'+FBP+'.json');if(!r.ok)throw new Error(r.status);return r.json();}
async function fbPut(p,v){await fetch(FBU+'/'+FBP+(p?'/'+p:'')+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(v)});}

// ── Order / Task builders ────────────────────────────────────
const RUT=["Zygosis/Ulcezol/Progas 1x1","Lamelat 1x1","Ketavel/Metadem 2x1","İlksef/Cezol 1x2","Devasid/Sulcid 3x1","İzotonik 100ml 5x1"];
const CKD=["İlksef 1x1","Pirofen 3x1"];
const LRJ=["Sulcid 3x2","Mucinac 3x1","Flagyl 3x1","Dengeli 2x1","İlksef 1x2","Ketavel 2x1","Lamelat 1x1","Ulcezol 1x1","Serum 4x1"];
function bldOrders(p){
  const pre=[],ex=[];let post;
  if(p.totallarenj)return{pre,post:[...LRJ],ex};
  const kid=p.age!==null&&p.age<=12;
  if(kid){post=[...CKD];if(p.tonsil)ex.push("Gasvin 1x1");if(p.kulak)ex.push("Zaridinex 3x5");return{pre,post,ex};}
  post=[...RUT];
  if(p.osas){pre.push("Lamelat 1x1");ex.push("Ramadex 100mg 1x1","Dengeli 1x1","Polgyl/Flagyl 3x1");}
  if(p.tonsil)ex.push("Gasvin");
  if(p.fess)post=post.map(x=>x.includes("Metadem")?"Paracerol 2x1":x);
  if(p.boyun)ex.push("Flagyl 3x1");
  if(p.acik)ex.push("Cipropol 2x1");
  if(p.kulak)ex.push("Zaridinex 3x5 (aynı gün)");
  if(p.tiroid||p.paratiroid)ex.push("Qalyviz 0.5mg 2x1","Calcimax 1x1");
  if(p.tiroid&&p.benign)ex.push("Levotiron 1x1");
  return{pre,post,ex};
}
function bldTasks(p){
  const t=["Yatış"];
  if(p.kayit)t.push("Kayıt");
  if(p.yfodyo)t.push("Yüksek Frekans Odyometri");
  if(p.muller)t.push("Müller Manevrası");
  if(p.fotograf)t.push("Fotoğraf");
  if(p.rinomano)t.push("Rinomanometri");
  if(p.lavaj)t.push("Lavaj Testi");
  if(p.kulak&&p.side)t.push("Saç Tıraşı ("+p.side+")");
  if(p.isaret&&p.side)t.push("Preop İşaret ("+p.side+")");
  t.push("Ameliyat İsteği");
  t.push("Sabah Epikriz & Order");
  return t;
}
function drCls(dr){if(!dr)return"other";const m={"FÖ":"FÖ","FO":"FÖ","SÇ":"SÇ","SC":"SÇ","SG":"SG","HEÖ":"HEÖ","HEO":"HEÖ","SŞE":"SŞE","SSE":"SŞE","EK":"EK","RG":"RG","HB":"HB","GKÇ":"GKÇ","GKC":"GKÇ","MSG":"MSG"};return m[dr]||"other";}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// ── Base patient data ─────────────────────────────────────────
const BASE=[
  {label:"Paz 29/3",patients:[
    {name:"Emrah Yoldaş",age:32,dr:"FÖ",op:"Sol Endoskopik Timpanoplasti",side:"SOL",ybu:false,hbsag:false,kayit:true,yfodyo:true,muller:false,fotograf:false,rinomano:false,lavaj:false,isaret:true,kulak:true,osas:false,tonsil:false,fess:false,boyun:false,acik:false,tiroid:false,paratiroid:false,benign:false,totallarenj:false,muayene:"OTOS: Sağ TM doğal, Sol TM posterosuperior santral perfore.\nODYO (23/10/2025): R:26/14 dB, L:46/14 dB\nBT (23/10/2025): Solda mastoid hücrelerde minimal effüzyon."},
    {name:"Hayrünnisa Güdek",age:5,dr:"FÖ",op:"Tonsillektomi",side:null,ybu:false,hbsag:false,kayit:false,yfodyo:false,muller:false,fotograf:false,rinomano:false,lavaj:false,isaret:false,kulak:false,osas:false,tonsil:true,fess:false,boyun:false,acik:false,tiroid:false,paratiroid:false,benign:false,totallarenj:false,muayene:"PFAPA tanılı hasta. OFX: Tonsiller Grade 1"},

// ── State ─────────────────────────────────────────────────────
// S = {di: {checks:[], extraTasks:[], extraChecks:[], notes:[], alarms:{}, addedPts:[], deleted:[], cancelled:{}}}
let S={};
let curDay=0,pendAlarm=null,pendAdd=0,pendMove=null,searchQ='',noteT={};

function setSd(s){const d=document.getElementById('sd');if(d)d.className='sd '+s;}

// ── Firebase ──────────────────────────────────────────────────
async function initFb(){
  setSd('wait');
  try{
    const fb=await fbGet()||{};
    // Load each day's state from Firebase
    BASE.forEach((d,di)=>{
      const x=fb[di]||{};
      S[di]={
        checks: x.checks || d.patients.map(p=>p.tasks.map(()=>false)),
        extraTasks: x.extraTasks || d.patients.map(()=>[]),
        extraChecks: x.extraChecks || d.patients.map(()=>[]),
        notes: x.notes || d.patients.map(()=>""),
        alarms: x.alarms || {},
        addedPts: x.addedPts || [],
        deleted: x.deleted || [],
        cancelled: x.cancelled || {}
      };
    });
    setSd('on');
    renderAll();
    startPoll();
  }catch(e){
    console.error(e);
    setSd('err');
    // Offline fallback - use empty state
    BASE.forEach((d,di)=>{
      S[di]={checks:d.patients.map(p=>p.tasks.map(()=>false)),extraTasks:d.patients.map(()=>[]),extraChecks:d.patients.map(()=>[]),notes:d.patients.map(()=>""),alarms:{},addedPts:[],deleted:[],cancelled:{}};
    });
    renderAll();
  }
}

let pollInt=null,lastFbStr='';
function startPoll(){
  if(pollInt)clearInterval(pollInt);
  pollInt=setInterval(async()=>{
    if(document.activeElement&&(document.activeElement.tagName==='TEXTAREA'||document.activeElement.tagName==='INPUT'))return;
    try{
      const fb=await fbGet()||{};
      const str=JSON.stringify(fb);
      if(str===lastFbStr)return;
      lastFbStr=str;
      BASE.forEach((d,di)=>{
        const x=fb[di]||{};
        const cur=S[di]||{};
        // Only update from Firebase, don't overwrite unsaved local changes
        if(x.checks)cur.checks=x.checks;
        if(x.extraTasks)cur.extraTasks=x.extraTasks;
        if(x.extraChecks)cur.extraChecks=x.extraChecks;
        if(x.notes)cur.notes=x.notes;
        if(x.alarms)cur.alarms=x.alarms;
        if(x.addedPts)cur.addedPts=x.addedPts;
        if(x.deleted)cur.deleted=x.deleted;
        if(x.cancelled)cur.cancelled=x.cancelled;
        S[di]=cur;
      });
      renderAll();
    }catch(e){}
  },6000);
}

function save(di,field,val){
  setSd('wait');
  fbPut(di+'/'+field,val).then(()=>setSd('on')).catch(()=>setSd('err'));
}

// ── Data helpers ──────────────────────────────────────────────
function getDay(di){return S[di]||(S[di]={checks:[],extraTasks:[],extraChecks:[],notes:[],alarms:{},addedPts:[],deleted:[],cancelled:{}});}
function getPts(di){
  const d=getDay(di);
  const base=BASE[di].patients
    .map((p,i)=>d.deleted.includes(i)?null:{...p,_bi:i,_cx:!!d.cancelled[i]})
    .filter(Boolean);
  const added=(d.addedPts||[]).map((p,i)=>{
    const pi=base.length+i;
    return{...p,tasks:p.tasks||bldTasks(p),_cx:!!d.cancelled[pi]};
  });
  return[...base,...added];
}
function getChk(di,pi){const d=getDay(di);return(d.checks&&d.checks[pi])||getPts(di)[pi].tasks.map(()=>false);}
function getExT(di,pi){const d=getDay(di);return(d.extraTasks&&d.extraTasks[pi])||[];}
function getExC(di,pi){const d=getDay(di);return(d.extraChecks&&d.extraChecks[pi])||[];}
function getNote(di,pi){const d=getDay(di);return(d.notes&&d.notes[pi]!==undefined)?d.notes[pi]:"";}
function getAlarm(di,pi){const d=getDay(di);return(d.alarms&&d.alarms[pi])||{};}

// ── Render ────────────────────────────────────────────────────
function renderAll(){
  const tabsEl=document.getElementById('tabs');
  const daysEl=document.getElementById('days');
  tabsEl.innerHTML='';daysEl.innerHTML='';

  // Tümü tab
  const allTab=document.createElement('div');
  allTab.className='tab'+(curDay===-1?' active':'');
  allTab.textContent='📋 Tümü';
  allTab.onclick=()=>switchDay(-1);
  tabsEl.appendChild(allTab);

  BASE.forEach((d,di)=>{
    const tab=document.createElement('div');
    tab.className='tab'+(di===curDay?' active':'');
    tab.textContent=d.label;
    tab.onclick=(i=>()=>switchDay(i))(di);
    tabsEl.appendChild(tab);
    const div=document.createElement('div');
    div.id='day-'+di;div.className='day'+(di===curDay?' active':'');
    daysEl.appendChild(div);
  });

  // All tab div
  const allDiv=document.createElement('div');
  allDiv.id='day-all';
  allDiv.className='day'+(curDay===-1?' active':'');
  daysEl.appendChild(allDiv);

  if(curDay===-1)renderAllPts();
  else renderDay(curDay);
  renderStats();
  updateSelects();
}

function renderDay(di){
  const el=document.getElementById('day-'+di);if(!el)return;
  const pts=getPts(di);
  const d=getDay(di);

  // Preserve note values
  const saved={};
  el.querySelectorAll('textarea.notarea').forEach(ta=>{saved[ta.dataset.key]=ta.value;});

  const active=pts.filter(p=>!p._cx);
  let td=0,tt=0,pd=0,ybu=0,cx=0;
  pts.forEach((p,i)=>{
    const chk=getChk(di,i),et=getExT(di,i),ec=getExC(di,i);
    const dn=chk.filter(Boolean).length+ec.filter(Boolean).length;
    tt+=chk.length+et.length;td+=dn;
    if(dn===chk.length+et.length&&chk.length+et.length>0)pd++;
    if(p.ybu&&!p._cx)ybu++;
    if(p._cx)cx++;
  });

  let h=`<div class="sumrow">
    <div class="met"><div class="met-v">${active.length}</div><div class="met-l">hasta</div></div>
    <div class="met"><div class="met-v">${pd}</div><div class="met-l">hazır</div></div>
    <div class="met"><div class="met-v">${td}</div><div class="met-l">tamamlanan</div></div>
    <div class="met red"><div class="met-v">${ybu}</div><div class="met-l">YBÜ</div></div>
    ${cx>0?`<div class="met grey"><div class="met-v">${cx}</div><div class="met-l">iptal</div></div>`:""}
  </div>`;

  if(ybu>0){const nm=pts.filter(p=>p.ybu&&!p._cx).map(p=>p.name.split(' ')[0]).join(', ');h+=`<div class="ybubar">🏥 YBÜ: ${nm}</div>`;}
  h+=`<div class="dayacts"><button class="dbtn add" onclick="openAddPt(${di})">+ Hasta Ekle</button><button class="dbtn" onclick="resetDay(${di})">Sıfırla</button></div>`;

  pts.forEach((p,pi)=>{
    const chk=getChk(di,pi),et=getExT(di,pi),ec=getExC(di,pi),alarm=getAlarm(di,pi);
    const nk=`${di}-${pi}`;
    const note=saved[nk]!==undefined?saved[nk]:getNote(di,pi);
    const dn=chk.filter(Boolean).length+ec.filter(Boolean).length;
    const total=chk.length+et.length;
    const done=dn===total&&total>0;
    const pct=total>0?Math.round(dn/total*100):0;
    const sc=p.side==='SOL'?'sol':p.side==='SAĞ'?'sag':'';
    const sb=p.side?`<span class="bdg ${sc}">${p.side}</span>`:"";

    const cxb=p._cx?'<span class="bdg cx">İptal</span>':"";
    const dc=drCls(p.dr||"");
    const db=p.dr?`<span class="drbdg dr-${dc}">${p.dr}</span>`:"";

    h+=`<div class="card${p._cx?' cx':''}" id="c-${di}-${pi}">
      <div class="chead">
        <div class="cinfo">
          <button class="cname" style="${done&&!p._cx?'text-decoration:line-through;color:#888780':''}" onclick="openDet(${di},${pi})">${esc(p.name||'')}${p.age?', '+p.age:''}</button>
          <div class="cop">${esc(p.op||'')}  </div>
          <div class="cmeta">${sb}${yb}${hb}${db}${cxb}</div>
        </div>
        <div style="display:flex;align-items:center;gap:2px">
          <span class="cnt">${dn}/${total}</span>
          <button class="movebtn" onclick="openMove(${di},${pi})" title="Taşı">⇄</button>
          <button class="cbtn" onclick="cancelPt(${di},${pi})" title="${p._cx?'İptali Kaldır':'İptal'}">${p._cx?'↩':'⊘'}</button>
          <button class="delbtn" onclick="delPt(${di},${pi})" title="Sil">🗑</button>
        </div>
      </div>
      <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
      <div class="tasks">`;

    p.tasks.forEach((t,ti)=>{
      const ak='t_'+ti,ha=alarm[ak],ts=t.replace(/'/g,"\\\'");
      h+=`<div class="task${chk[ti]?' done':''}" onclick="tgl(${di},${pi},${ti})">
        <input type="checkbox" ${chk[ti]?'checked':''} onclick="event.stopPropagation();tgl(${di},${pi},${ti})">
        <label>${esc(t)}</label>
        ${ha?`<span class="atag" onclick="event.stopPropagation();openAlarm(${di},${pi},'${ak}','${ts}')">⏰${ha}</span>`:""}
        <span class="aico" onclick="event.stopPropagation();openAlarm(${di},${pi},'${ak}','${ts}')">🔔</span>
      </div>`;
    });
    h+='</div>';

    if(et.length){
      h+='<div class="etasks">';
      et.forEach((t,eti)=>{
        const ak='e_'+eti,ha=alarm[ak],ts=(t||'').replace(/'/g,"\\\'");
        h+=`<div class="etask${ec[eti]?' done':''}" >
          <input type="checkbox" ${ec[eti]?'checked':''} onclick="tglEx(${di},${pi},${eti})">
          <label onclick="tglEx(${di},${pi},${eti})">${esc(t)}</label>
          ${ha?`<span class="atag" onclick="openAlarm(${di},${pi},'${ak}','${ts}')">⏰${ha}</span>`:""}
          <span class="aico" onclick="openAlarm(${di},${pi},'${ak}','${ts}')">🔔</span>
          <button class="edel" onclick="delEx(${di},${pi},${eti})">×</button>

      });

    }

    h+=`<div class="addrow"><input class="addinp" type="text" id="nt-${di}-${pi}" placeholder="Ekstra görev..." onkeydown="if(event.key==='Enter')addEx(${di},${pi})"><button class="addbtn" onclick="addEx(${di},${pi})">+</button></div>`;

    const{pre,post,ex}=bldOrders(p);
    h+='<div class="orders"><div class="otitle">Orderlar</div>';
    if(pre.length){h+='<div class="olbl">Preop:</div><div class="opills">';pre.forEach(o=>{h+=`<span class="opill pre">${o}</span>`;});h+='</div>';}
    h+='<div class="olbl">Postop:</div><div class="opills">';
    post.forEach(o=>{h+=`<span class="opill">${o}</span>`;});
    ex.forEach(o=>{h+=`<span class="opill ex">${o}</span>`;});
    h+='</div></div>';

    h+=`<div class="note-wrap"><textarea class="notarea" data-key="${nk}" placeholder="Not..." oninput="noteInput(${di},${pi},this.value)" onblur="noteBlur(${di},${pi},this.value)">${esc(note)}</textarea></div>`;
    h+='</div>';
  });

  el.innerHTML=h;
}

// ── Stats bar ────────────────────────────────────────────────
function renderStats(){
  const el=document.getElementById('drstats');if(!el)return;
  let pts=[];
  if(curDay===-1){BASE.forEach((_,di)=>pts.push(...getPts(di)));}
  else pts=getPts(curDay);
  pts=pts.filter(p=>!p._cx);
  const drC={};pts.forEach(p=>{if(p.dr)drC[p.dr]=(drC[p.dr]||0)+1;});
  let h=curDay===-1?`<span style="font-size:10px;color:#888780;margin-right:4px">${pts.length} hasta · Dr:</span>`
    :'<span style="font-size:10px;color:#888780;margin-right:4px">Dr:</span>';
  if(!Object.keys(drC).length)h+='<span style="font-size:10px;color:#ccc">—</span>';
  Object.entries(drC).sort((a,b)=>b[1]-a[1]).forEach(([dr,n])=>{h+=`<span class="spill">${dr} (${n})</span>`;});
  el.innerHTML=h;
}

// ── Actions ───────────────────────────────────────────────────
function switchDay(di){
  curDay=di;
  const tabs=document.querySelectorAll('.tab');
  const days=document.querySelectorAll('.day');
  if(di===-1){
    tabs.forEach((t,i)=>t.classList.toggle('active',i===0));
    days.forEach((d,i)=>d.classList.toggle('active',i===BASE.length));
    renderAllPts();
  } else {
    tabs.forEach((t,i)=>t.classList.toggle('active',i===di+1));
    days.forEach((d,i)=>d.classList.toggle('active',i===di));
    renderDay(di);
  }
  renderStats();
}

function tgl(di,pi,ti){
  const d=getDay(di);
  if(!d.checks[pi])d.checks[pi]=getPts(di)[pi].tasks.map(()=>false);
  d.checks[pi][ti]=!d.checks[pi][ti];
  renderDay(di);
  save(di,'checks',d.checks);
}
function tglEx(di,pi,eti){
  const d=getDay(di);
  if(!d.extraChecks[pi])d.extraChecks[pi]=[];
  d.extraChecks[pi][eti]=!d.extraChecks[pi][eti];
  renderDay(di);
  save(di,'extraChecks',d.extraChecks);
}
function addEx(di,pi){
  const inp=document.getElementById(`nt-${di}-${pi}`);
  const val=inp.value.trim();if(!val)return;
  const d=getDay(di);
  if(!d.extraTasks[pi])d.extraTasks[pi]=[];
  if(!d.extraChecks[pi])d.extraChecks[pi]=[];
  d.extraTasks[pi].push(val);d.extraChecks[pi].push(false);
  renderDay(di);
  save(di,'extraTasks',d.extraTasks);
  save(di,'extraChecks',d.extraChecks);
}
function delEx(di,pi,eti){
  const d=getDay(di);
  d.extraTasks[pi].splice(eti,1);d.extraChecks[pi].splice(eti,1);
  renderDay(di);
  save(di,'extraTasks',d.extraTasks);
  save(di,'extraChecks',d.extraChecks);
}
function noteInput(di,pi,val){
  clearTimeout(noteT[`${di}-${pi}`]);
  noteT[`${di}-${pi}`]=setTimeout(()=>noteBlur(di,pi,val),2000);
}
function noteBlur(di,pi,val){
  clearTimeout(noteT[`${di}-${pi}`]);
  const d=getDay(di);
  if(!d.notes)d.notes=[];
  d.notes[pi]=val;
  save(di,'notes',d.notes);
}
function delPt(di,pi){
  if(!confirm('Bu hasta silinsin mi?'))return;
  const d=getDay(di);
  const baseCount=BASE[di].patients.length;
  if(pi<baseCount){
    if(!d.deleted)d.deleted=[];
    if(!d.deleted.includes(pi))d.deleted.push(pi);
    save(di,'deleted',d.deleted);
  } else {
    d.addedPts.splice(pi-baseCount,1);
    save(di,'addedPts',d.addedPts);
  }
  renderDay(di);renderStats();
}
function cancelPt(di,pi){
  const d=getDay(di);
  if(!d.cancelled)d.cancelled={};
  d.cancelled[pi]=!d.cancelled[pi];
  renderDay(di);renderStats();
  save(di,'cancelled',d.cancelled);
}
function resetDay(di){
  if(!confirm('Bu günün tikleri sıfırlansın mı?'))return;
  const d=getDay(di);
  const pts=getPts(di);
  d.checks=pts.map(p=>p.tasks.map(()=>false));
  d.extraChecks=pts.map(()=>[]);
  renderDay(di);
  save(di,'checks',d.checks);
  save(di,'extraChecks',d.extraChecks);
}

// ── Search ────────────────────────────────────────────────────
function doSearch(){
  const q=document.getElementById('sinp').value.trim().toLowerCase();
  searchQ=q;
  document.getElementById('sclr').style.display=q?'block':'none';
  if(!q){document.querySelectorAll('.day').forEach((d,i)=>d.classList.toggle('active',i===curDay));return;}
  // Focus all-day with filter
  allQ=q;
  switchDay(-1);
  document.getElementById('sinp').focus();
}
function clearSearch(){
  searchQ='';allQ='';
  document.getElementById('sinp').value='';
  document.getElementById('sclr').style.display='none';
  switchDay(0);
}

// ── Move ──────────────────────────────────────────────────────
function openMove(di,pi){
  pendMove={di,pi};
  const p=getPts(di)[pi];
  document.getElementById('move-info').textContent=(p.name||'')+' → '+(p.op||''). substring(0,40);
  const sel=document.getElementById('move-day');sel.innerHTML='';
  BASE.forEach((d,i)=>{if(i===di)return;const o=document.createElement('option');o.value=i;o.textContent=d.label;sel.appendChild(o);});
  openOv('move-ov');
}
function confirmMove(){
  if(!pendMove)return;
  const{di,pi}=pendMove;
  const toDi=parseInt(document.getElementById('move-day').value);
  const pts=getPts(di);
  const p={...pts[pi]};delete p._bi;delete p._cx;
  p.tasks=p.tasks||bldTasks(p);
  const baseCount=BASE[di].patients.length;
  const dSrc=getDay(di),dDst=getDay(toDi);
  if(pi<baseCount){
    if(!dSrc.deleted)dSrc.deleted=[];
    dSrc.deleted.push(pi);
    save(di,'deleted',dSrc.deleted);
  } else {
    dSrc.addedPts.splice(pi-baseCount,1);
    save(di,'addedPts',dSrc.addedPts);
  }
  if(!dDst.addedPts)dDst.addedPts=[];
  dDst.addedPts.push(p);
  save(toDi,'addedPts',dDst.addedPts);
  closeOv('move-ov');
  renderAll();
}

// ── Alarm ─────────────────────────────────────────────────────
function updateSelects(){
  ['al-day','move-day'].forEach(id=>{
    const s=document.getElementById(id);if(!s)return;
    if(id==='al-day'){s.innerHTML='';BASE.forEach((d,i)=>{const o=document.createElement('option');o.value=i;o.textContent=d.label;s.appendChild(o);});}
  });
}
function openAlarm(di,pi,key,tn){
  pendAlarm={di,pi,key};
  document.getElementById('al-task').value=tn;
  document.getElementById('al-day').value=di;
  document.getElementById('al-time').value=getAlarm(di,pi)[key]||'';
  document.getElementById('al-warn').style.display=('Notification'in window&&Notification.permission==='granted')?'none':'block';
  openOv('alarm-ov');
}
function saveAlarm(){
  if(!pendAlarm)return;
  const time=document.getElementById('al-time').value;
  const day=parseInt(document.getElementById('al-day').value);
  const{pi,key}=pendAlarm;
  if(!time){alert('Saat seçin.');return;}
  if('Notification'in window&&Notification.permission!=='granted')Notification.requestPermission();
  const d=getDay(day);
  if(!d.alarms)d.alarms={};
  if(!d.alarms[pi])d.alarms[pi]={};
  d.alarms[pi][key]=time;
  save(day,'alarms',d.alarms);
  schedNotif(day,pi,key,time);
  closeOv('alarm-ov');
  renderDay(day);
}
function clearAlarm(){
  if(!pendAlarm)return;
  const{di,pi,key}=pendAlarm;
  const d=getDay(di);
  if(d.alarms&&d.alarms[pi])delete d.alarms[pi][key];
  save(di,'alarms',d.alarms);
  closeOv('alarm-ov');
  renderDay(di);
}
function schedNotif(di,pi,key,time){
  const[h,m]=time.split(':').map(Number);
  const now=new Date(),t=new Date();t.setHours(h,m,0,0);
  if(t<=now)t.setDate(t.getDate()+1);
  const p=getPts(di)[pi];
  const et=getExT(di,pi);
  const tn=key.startsWith('t_')?p.tasks[parseInt(key.slice(2))]:et[parseInt(key.slice(2))]||'';
  alert(`⏰ ${p.name} — ${tn}\nSaat: ${time} (~${Math.round((t-now)/60000)} dk)`);
  setTimeout(()=>{
    if('Notification'in window&&Notification.permission==='granted'){
      try{new Notification('KBB — '+p.name,{body:tn});}catch(e){alert('⏰ '+p.name+'\n'+tn);}
    }else alert('⏰ '+p.name+'\n'+tn);
  },t-now);
}

// ── Add Patient ───────────────────────────────────────────────
function openAddPt(di){
  pendAdd=di;
  ['np-ad','np-op','np-dr'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('np-yas').value='';
  document.getElementById('np-side').value='';
  ['np-ybu','np-hbsag','np-kayit','np-yfodyo','np-muller','np-foto','np-rino','np-lavaj','np-kulak','np-osas','np-tonsil','np-fess','np-boyun','np-acik','np-tiroid','np-para','np-benign','np-larenj'].forEach(id=>document.getElementById(id).checked=false);
  openOv('add-ov');
}
function saveNewPt(){
  const name=document.getElementById('np-ad').value.trim();
  const op=document.getElementById('np-op').value.trim();
  if(!name||!op){alert('Ad ve ameliyat zorunlu.');return;}
  const sv=document.getElementById('np-side').value;
  const p={name,op,dr:document.getElementById('np-dr').value.trim().toUpperCase()||null,
    age:parseInt(document.getElementById('np-yas').value)||null,side:sv||null,
    ybu:document.getElementById('np-ybu').checked,hbsag:document.getElementById('np-hbsag').checked,
    kayit:document.getElementById('np-kayit').checked,yfodyo:document.getElementById('np-yfodyo').checked,
    muller:document.getElementById('np-muller').checked,fotograf:document.getElementById('np-foto').checked,
    rinomano:document.getElementById('np-rino').checked,lavaj:document.getElementById('np-lavaj').checked,
    isaret:!!sv,kulak:document.getElementById('np-kulak').checked,
    osas:document.getElementById('np-osas').checked,tonsil:document.getElementById('np-tonsil').checked,
    fess:document.getElementById('np-fess').checked,boyun:document.getElementById('np-boyun').checked,
    acik:document.getElementById('np-acik').checked,tiroid:document.getElementById('np-tiroid').checked,
    paratiroid:document.getElementById('np-para').checked,benign:document.getElementById('np-benign').checked,
    totallarenj:document.getElementById('np-larenj').checked,muayene:''};
  p.tasks=bldTasks(p);
  const d=getDay(pendAdd);
  if(!d.addedPts)d.addedPts=[];
  d.addedPts.push(p);
  save(pendAdd,'addedPts',d.addedPts);
  closeOv('add-ov');
  renderDay(pendAdd);renderStats();
}

// ── Detail ────────────────────────────────────────────────────
function openDet(di,pi){
  const p=getPts(di)[pi];
  document.getElementById('det-name').textContent=(p.name||'')+( p.age?', '+p.age:'')+(p.dr?' — '+p.dr:'');
  document.getElementById('det-op').textContent=p.op||'';
  document.getElementById('det-txt').textContent=p.muayene||'—';
  openOv('det-ov');
}

function openOv(id){document.getElementById(id).classList.add('open');}
function closeOv(id){document.getElementById(id).classList.remove('open');pendAlarm=null;pendMove=null;}
async function reqNotif(){
  if(!('Notification'in window)){alert('Desteklenmiyor.');return;}
  if(Notification.permission==='granted'){alert('✓ İzin zaten var!');return;}
  const p=await Notification.requestPermission();
  alert(p==='granted'?'✓ İzin verildi!':' ❌ Reddedildi.');
}

// ── Search bar input ──────────────────────────────────────────
document.getElementById('sinp').addEventListener('input',doSearch);

// ── Login ─────────────────────────────────────────────────────
const USERS={'kbb':'servis2026','nobetci':'nobet2026'};
function doLogin(){
  const u=(document.getElementById('lu').value||''). trim().toLowerCase();
  const p=document.getElementById('lp').value||'';
  if(USERS[u]!==undefined&&USERS[u]===p){
    try{localStorage.setItem('kbb_ok','1');}catch(e){}
    document.getElementById('lscrn').style.display='none';
    startApp();
  } else {
    document.getElementById('lerr').textContent='Hatalı giriş.';
    document.getElementById('lp').value='';
    document.getElementById('lp').focus();
    setTimeout(()=>{document.getElementById('lerr').textContent='';},3000);
  }
}
document.getElementById('lbtn').addEventListener('click',doLogin);
document.getElementById('lu').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('lp').focus();});
document.getElementById('lp').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

function startApp(){renderAll();initFb();}

(function(){
  let ok=false;try{ok=localStorage.getItem('kbb_ok')==='1';}catch(e){}
  if(ok){document.getElementById('lscrn').style.display='none';startApp();}
  else document.getElementById('lscrn').style.display='flex';
})();

if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
