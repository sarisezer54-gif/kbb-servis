<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a18">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="KBB Servis">
<link rel="manifest" href="manifest.json">
<title>KBB Servis</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a18;min-height:100vh;padding-bottom:80px}
/* Header */
.hdr{padding:.85rem 1rem .5rem;background:#1a1a18;display:flex;align-items:center;justify-content:space-between;gap:8px}
.hdr-txt{flex:1;min-width:0}
.hdr-title{font-size:15px;font-weight:600;color:#fff}
.hdr-sub{font-size:10px;color:rgba(255,255,255,.45);margin-top:1px}
.sd{width:7px;height:7px;border-radius:50%;background:#888;display:inline-block;margin-right:5px;transition:background .3s}
.sd.on{background:#1d9e75}.sd.wait{background:#f0a500}.sd.err{background:#e24b4a}
.hbtn{font-size:11px;padding:5px 9px;border:.5px solid rgba(255,255,255,.3);border-radius:8px;background:transparent;cursor:pointer;color:#fff}
.hbtn.pk{background:#fff;color:#1a1a18;border:none;font-weight:500}
/* Search */
.searchbar{padding:7px 1rem;background:#fff;border-bottom:.5px solid rgba(0,0,0,.08);display:flex;align-items:center;gap:8px}
.sinp{flex:1;font-size:13px;padding:6px 10px;border:.5px solid rgba(0,0,0,.12);border-radius:8px;background:#f9f9f7;font-family:inherit;color:#1a1a18;outline:none}
.sinp:focus{border-color:#1a1a18}
.sclr{font-size:16px;color:#ccc;cursor:pointer;background:none;border:none;line-height:1;padding:0 2px}
/* Stats */
.drstats{padding:6px 1rem;background:#fff;border-bottom:.5px solid rgba(0,0,0,.08);display:flex;gap:5px;flex-wrap:wrap;align-items:center;min-height:30px}
.spill{font-size:10px;padding:2px 8px;border-radius:20px;background:#f0f0ee;color:#3a3a38;border:.5px solid rgba(0,0,0,.08);font-weight:500}
/* Tabs */
.tabs{display:flex;overflow-x:auto;border-bottom:.5px solid rgba(0,0,0,.1);scrollbar-width:none;background:#fff}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:9px 12px;font-size:11px;cursor:pointer;border-bottom:2px solid transparent;color:#5f5e5a;white-space:nowrap;line-height:1.3;text-align:center}
.tab span{display:block}.tab .tsub{font-size:10px;color:#aaa}
.tab.active{color:#1a1a18;border-bottom-color:#1a1a18;font-weight:500}
.tab.active .tsub{color:#5f5e5a}
/* Day */
.day{display:none;padding:.75rem 1rem 1rem}.day.active{display:block}
/* Summary */
.sumrow{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.met{background:#ebebea;border-radius:8px;padding:8px 10px;flex:1;min-width:60px}
.met-v{font-size:18px;font-weight:500}.met-l{font-size:10px;color:#5f5e5a;margin-top:1px}
.met.red{background:#fcebeb}.met.red .met-v,.met.red .met-l{color:#a32d2d}
.met.grey{background:#f5f5f3;border:.5px solid #e0e0e0}.met.grey .met-v{color:#888;font-size:16px}.met.grey .met-l{color:#aaa}
.ybubar{background:#fcebeb;border:.5px solid rgba(163,45,45,.2);border-radius:8px;padding:7px 12px;margin-bottom:10px;font-size:12px;color:#a32d2d}
.dayacts{display:flex;gap:8px;margin-bottom:12px}
.dbtn{font-size:12px;padding:7px 12px;border:.5px solid rgba(0,0,0,.2);border-radius:8px;background:#fff;cursor:pointer;color:#1a1a18;flex:1}
.dbtn.add{background:#1a1a18;color:#fff;border:none}
/* Card */
.card{background:#fff;border:.5px solid rgba(0,0,0,.12);border-radius:12px;margin-bottom:10px;overflow:hidden}
.card.cancelled-card{opacity:.55;border-style:dashed}
.chead{display:flex;align-items:flex-start;gap:8px;padding:10px 12px 5px}
.cinfo{flex:1;min-width:0}
.cname{font-size:14px;font-weight:500;cursor:pointer;color:#1a1a18;background:none;border:none;padding:0;text-align:left;font-family:inherit;display:block;width:100%}
.cop{font-size:11px;color:#5f5e5a;margin-top:2px}
.camdate{font-size:10px;color:#aaa;margin-top:1px}
.cmeta{display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap}
.bdg{font-size:10px;padding:2px 7px;border-radius:8px}
.bdg.sol{background:#e6f1fb;color:#185fa5}.bdg.sag{background:#faeeda;color:#854f0b}.bdg.ybu{background:#fcebeb;color:#a32d2d}
.bdg.hbsag{background:#fde8e8;color:#c0392b;border:.5px solid rgba(192,57,43,.3);font-weight:500}
.bdg.cancelled{background:#f0f0ee;color:#888}
.drbdg{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:500}
.dr-FÖ,.dr-FO{background:#f3e5f5;color:#6a1b9a}
.dr-SÇ,.dr-SC{background:#e8f5e9;color:#1b5e20}
.dr-SG{background:#e3f2fd;color:#0d47a1}
.dr-HEÖ,.dr-HEO{background:#fce4ec;color:#880e4f}
.dr-SŞE,.dr-SSE{background:#fff3e0;color:#e65100}
.dr-EK{background:#e0f2f1;color:#004d40}
.dr-RG{background:#f1f8e9;color:#33691e}
.dr-HB{background:#fff8e1;color:#f57f17}
.dr-GKÇ,.dr-GKC{background:#e1f5fe;color:#01579b}
.dr-MSG{background:#fbe9e7;color:#bf360c}
.dr-other{background:#f5f5f5;color:#616161}
.cbtn{font-size:11px;color:#bbb;cursor:pointer;padding:0 3px;border:none;background:transparent;flex-shrink:0}
.cbtn:hover{color:#e65100}
.delbtn{font-size:12px;color:#ddd;cursor:pointer;padding:0 3px;border:none;background:transparent;flex-shrink:0}
.delbtn:hover{color:#e24b4a}
.movebtn{font-size:12px;color:#bbb;cursor:pointer;padding:0 3px;border:none;background:transparent;flex-shrink:0}
.movebtn:hover{color:#1a1a18}
/* Progress */
.pbar{height:3px;background:rgba(0,0,0,.07);margin:0 12px 7px;border-radius:2px}
.pfill{height:100%;background:#1d9e75;border-radius:2px;transition:width .3s}
/* Tasks */
.tasks{padding:0 12px 7px;display:flex;flex-wrap:wrap;gap:6px}
.task{display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none}
.task input[type=checkbox]{width:15px;height:15px;accent-color:#1d9e75;cursor:pointer;flex-shrink:0}
.task label{font-size:12px;cursor:pointer}
.task.done label{text-decoration:line-through;color:#888780}
.atag{font-size:10px;color:#854f0b;background:#fff3e0;padding:1px 5px;border-radius:4px;cursor:pointer;margin-left:2px}
.aico{font-size:11px;color:#ccc;cursor:pointer;margin-left:1px}
.etasks{padding:0 12px 5px}
.etask{display:flex;align-items:center;gap:4px;margin-bottom:4px}
.etask input[type=checkbox]{width:15px;height:15px;accent-color:#1d9e75;flex-shrink:0}
.etask label{font-size:12px;flex:1;cursor:pointer}
.etask.done label{text-decoration:line-through;color:#888780}
.edel{font-size:14px;color:#ddd;cursor:pointer;padding:0 4px;background:none;border:none}
.addrow{display:flex;gap:6px;margin:0 12px 7px}
.addinp{flex:1;font-size:12px;padding:6px 8px;border:.5px solid rgba(0,0,0,.15);border-radius:8px;background:#fff;font-family:inherit;color:#1a1a18}
.addbtn{font-size:12px;padding:6px 10px;border:none;border-radius:8px;background:#1d9e75;color:#fff;cursor:pointer;font-weight:500}
/* Orders */
.orders{margin:0 12px 7px;border-top:.5px solid rgba(0,0,0,.07);padding-top:6px}
.otitle{font-size:10px;font-weight:500;color:#5f5e5a;margin-bottom:3px}
.olbl{font-size:10px;color:#888780;margin-bottom:2px;margin-top:3px}
.opills{display:flex;flex-wrap:wrap;gap:3px}
.opill{font-size:10px;padding:2px 7px;border-radius:20px;background:#f0f0ee;color:#3a3a38;border:.5px solid rgba(0,0,0,.08)}
.opill.ex{background:#eaf3de;color:#3b6d11}.opill.pre{background:#e6f1fb;color:#185fa5}
/* Note */
.note-wrap{padding:0 12px 10px}
.notarea{background:#fffef5;border:.5px solid rgba(0,0,0,.1);border-radius:8px;padding:8px;font-size:12px;color:#3a3a38;width:100%;min-height:44px;resize:vertical;font-family:inherit;display:block}
.notarea::placeholder{color:#aaa}
.cnt{font-size:11px;color:#5f5e5a;flex-shrink:0;margin-top:1px}
/* Search results */
.sr-wrap{padding:.75rem 1rem}
.sr-hdr{font-size:12px;color:#5f5e5a;margin-bottom:8px;font-weight:500}
/* Modals */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
.ov.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:1.25rem;width:calc(100% - 2rem);max-width:520px;max-height:88vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:500;margin-bottom:.75rem}
.mlbl{font-size:12px;color:#5f5e5a;display:block;margin-bottom:3px;margin-top:10px}
.modal input[type=time],.modal input[type=text],.modal input[type=number],.modal select{width:100%;padding:8px 10px;border:.5px solid rgba(0,0,0,.2);border-radius:8px;font-size:14px;margin-bottom:4px;font-family:inherit;background:#fff;color:#1a1a18}
.mchkrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.mchk{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer}
.mchk input{width:15px;height:15px;accent-color:#1d9e75}
.mbtns{display:flex;gap:8px;margin-top:12px}
.mbtn{flex:1;padding:10px;border-radius:8px;font-size:14px;cursor:pointer;border:none;font-family:inherit}
.mbtn.ok{background:#1d9e75;color:#fff}.mbtn.no{background:#f0f0ee;color:#3a3a38}.mbtn.del{background:#fcebeb;color:#a32d2d}
.dettxt{font-size:12px;line-height:1.6;background:#f9f9f7;border-radius:8px;padding:10px;white-space:pre-wrap;color:#1a1a18;margin-top:6px}
/* Login */
.lscrn{display:none;position:fixed;inset:0;z-index:999;align-items:center;justify-content:center;background:#1a1a18}
.lscrn.show{display:flex}
.lbox{background:#fff;border-radius:16px;padding:2rem 1.5rem;width:calc(100% - 3rem);max-width:360px;text-align:center}
.lbox h2{font-size:20px;font-weight:600;margin-bottom:2px}
.lsub{font-size:11px;color:#aaa;margin-bottom:4px}
.ldesc{font-size:13px;color:#888780;margin-bottom:1.5rem}
.linp{width:100%;padding:10px 12px;border:.5px solid rgba(0,0,0,.2);border-radius:10px;font-size:15px;font-family:inherit;color:#1a1a18;margin-bottom:10px;display:block;-webkit-appearance:none}
.linp:focus{outline:none;border-color:#1a1a18}
.lbtn{width:100%;padding:12px;background:#1a1a18;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit}
.lerr{font-size:12px;color:#e24b4a;margin-top:8px;min-height:18px}
/* Loading */
.ldov{display:none;position:fixed;inset:0;background:rgba(255,255,255,.9);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.ldov.open{display:flex}
.spin{width:32px;height:32px;border:3px solid #ebebea;border-top-color:#1d9e75;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>

// ── State ────────────────────────────────────────────────────
let S=null,curDay=0,pendAlarm=null,pendAddDay=0,pendMove=null;
let noteTimers={},pollInt=null,lastStr='',searchQ='';

function setSd(s){const d=document.getElementById('sd');if(d)d.className='sd '+s;}

// ── Firebase ─────────────────────────────────────────────────
async function initFb(){
  setSd('wait');
  try{
    let v=await fbGet();
    // Re-init if empty or day count doesn't match
    if(!v||!v.days||v.days.length<BASE.length){
      const existing=(v&&v.days)||[];
      const days=BASE.map((d,i)=>{
        // Preserve existing Firebase data if available
        const ex=existing[i]||{};
        return {
          label:d.label,amdate:d.amdate,
          checks:ex.checks||d.patients.map(p=>p.tasks.map(()=>false)),
          extraTasks:ex.extraTasks||d.patients.map(()=>[]),
          extraChecks:ex.extraChecks||d.patients.map(()=>[]),
          notes:ex.notes||d.patients.map(()=>''),
          alarms:ex.alarms||d.patients.map(()=>({})),
          addedPatients:ex.addedPatients||[],
          deletedBase:ex.deletedBase||[],
          cancelled:ex.cancelled||{}
        };
      });
      v={days};
      await fbPut('',v);
    }
    S=v;renderAll();setSd('on');
    startPoll();
  }catch(e){console.error('FB:',e);setSd('err');renderAll();}
}

function startPoll(){
  if(pollInt)clearInterval(pollInt);
  pollInt=setInterval(async()=>{
    const ae=document.activeElement;
    if(ae&&(ae.tagName==='TEXTAREA'||ae.tagName==='INPUT'))return;
    try{
      const v=await fbGet();
      const vs=JSON.stringify(v);
      if(v&&vs!==lastStr){lastStr=vs;S=v;if(!searchQ)renderAll();}
    }catch(e){}
  },4000);
}

// ── Data helpers ─────────────────────────────────────────────
function numDays(){return BASE.length;}
function getDayMeta(di){return{label:BASE[di]?BASE[di].label:'',amdate:BASE[di]?BASE[di].amdate:''};}
function getPts(di){
  const del=(S&&S.days&&S.days[di]&&S.days[di].deletedBase)||[];
  const canc=(S&&S.days&&S.days[di]&&S.days[di].cancelled)||{};
  const base=BASE[di]?BASE[di].patients
    .map((p,i)=>del.includes(i)?null:{...p,_bi:i,_cancelled:!!canc[i]})
    .filter(Boolean):[];
  const added=((S&&S.days&&S.days[di]&&S.days[di].addedPatients)||[]).map((p,i)=>{
    const pi=base.length+i;
    return{...p,tasks:p.tasks||bldTasks(p),_cancelled:!!canc[pi]};
  });
  return[...base,...added];
}
function fbChk(di,pi){return(S&&S.days&&S.days[di]&&S.days[di].checks&&S.days[di].checks[pi])||getPts(di)[pi].tasks.map(()=>false);}
function fbExT(di,pi){return(S&&S.days&&S.days[di]&&S.days[di].extraTasks&&S.days[di].extraTasks[pi])||[];}
function fbExC(di,pi){return(S&&S.days&&S.days[di]&&S.days[di].extraChecks&&S.days[di].extraChecks[pi])||[];}
function fbNote(di,pi){const n=S&&S.days&&S.days[di]&&S.days[di].notes&&S.days[di].notes[pi];return n!=null?n:'';}
function fbAlarm(di,pi){return(S&&S.days&&S.days[di]&&S.days[di].alarms&&S.days[di].alarms[pi])||{};}
async function save(path,val){setSd('wait');try{await fbPut(path,val);setSd('on');}catch(e){setSd('err');}}

// ── Render ────────────────────────────────────────────────────
function renderAll(){
  if(searchQ){doSearch(searchQ);return;}
  const tabsEl=document.getElementById('tabs');
  const daysEl=document.getElementById('days');
  tabsEl.innerHTML='';daysEl.innerHTML='';
  // "Tüm Hastalar" tab (index = -1)
  const allTab=document.createElement('div');
  allTab.className='tab'+(curDay===-1?' active':'');
  allTab.id='tab-all';
  allTab.innerHTML='<span>📋 Tümü</span><span class="tsub">56 hasta</span>';
  allTab.onclick=function(){switchAll();};
  tabsEl.appendChild(allTab);

  BASE.forEach((d,di)=>{
    const tab=document.createElement('div');
    tab.className='tab'+(di===curDay?' active':'');
    tab.id='tab-'+di;
    tab.innerHTML='<span>'+d.label+'</span>';
    tab.onclick=(function(i){return function(){switchDay(i);};})(di);
    tabsEl.appendChild(tab);
    const div=document.createElement('div');
    div.id='day-'+di;div.className='day'+(di===curDay?' active':'');
    daysEl.appendChild(div);
  });

  // All patients div
  const allDiv=document.createElement('div');
  allDiv.id='day-all';allDiv.className='day'+(curDay===-1?' active':'');
  daysEl.appendChild(allDiv);

  if(curDay===-1){renderAll2();renderStats(-1);}
  else{renderDay(curDay);renderStats(curDay);}
  updateSelects();
}

function renderDay(di){
  const el=document.getElementById('day-'+di);if(!el)return;
  const pts=getPts(di);
  const m=getDayMeta(di);
  const savedNotes={};
  el.querySelectorAll('textarea.notarea').forEach(ta=>{savedNotes[ta.dataset.key]=ta.value;});
  let td=0,tt=0,pd=0,ybu=0;
  const active=pts.filter(p=>!p._cancelled);
  pts.forEach((p,i)=>{
    const pt=fbChk(di,i),et=fbExT(di,i),ec=fbExC(di,i);
    const dn=pt.filter(Boolean).length+ec.filter(Boolean).length;
    tt+=pt.length+et.length;td+=dn;
    if(dn===pt.length+et.length&&pt.length+et.length>0)pd++;
    if(p.ybu&&!p._cancelled)ybu++;
  });
  const cancelled=pts.filter(p=>p._cancelled).length;
  let h=`<div class="sumrow">
    <div class="met"><div class="met-v">${active.length}</div><div class="met-l">toplam hasta</div></div>
    <div class="met"><div class="met-v">${pd}</div><div class="met-l">hazır hasta</div></div>
    <div class="met"><div class="met-v">${td}</div><div class="met-l">tamamlanan</div></div>
    <div class="met red"><div class="met-v">${ybu}</div><div class="met-l">YBÜ yeri</div></div>
    ${cancelled>0?`<div class="met grey"><div class="met-v">${cancelled}</div><div class="met-l">iptal</div></div>`:''}
  </div>`;
  if(ybu>0){const names=pts.filter(p=>p.ybu&&!p._cancelled).map(p=>p.name.split(' ')[0]).join(', ');h+=`<div class="ybubar">🏥 ${ybu} YBÜ: ${names}</div>`;}
  h+=`<div class="dayacts"><button class="dbtn add" onclick="openAddPt(${di})">+ Hasta Ekle</button><button class="dbtn" onclick="resetDay(${di})">Günü Sıfırla</button></div>`;
  h+=renderCards(di,pts,m,savedNotes);
  el.innerHTML=h;
}

function renderCards(di,pts,m,savedNotes){
  let h='';
  pts.forEach((p,pi)=>{
    const pt=fbChk(di,pi),et=fbExT(di,pi),ec=fbExC(di,pi),alarm=fbAlarm(di,pi);
    const noteKey=`${di}-${pi}`;
    const note=savedNotes&&savedNotes[noteKey]!==undefined?savedNotes[noteKey]:fbNote(di,pi);
    const dn=pt.filter(Boolean).length+ec.filter(Boolean).length;
    const total=pt.length+et.length;
    const done=dn===total&&total>0;
    const pct=total>0?Math.round(dn/total*100):0;
    const sc=p.side==='SOL'?'sol':p.side==='SAĞ'?'sag':'';
    const sb=p.side?`<span class="bdg ${sc}">${p.side}</span>`:'';
    const yb=p.ybu?'<span class="bdg ybu">YBÜ</span>':'';
    const hb=p.hbsag?'<span class="bdg hbsag">⚠️ HBsAg+</span>':'';
    const canB=p._cancelled?'<span class="bdg cancelled">İptal</span>':'';
    const dc=drCls(p.dr||'');
    const db=p.dr?`<span class="drbdg dr-${dc}">${p.dr}</span>`:'';
    h+=`<div class="card${p._cancelled?' cancelled-card':''}" id="card-${di}-${pi}">
      <div class="chead">
        <div class="cinfo">
          <button class="cname" style="${done&&!p._cancelled?'text-decoration:line-through;color:#888780':''}" onclick="openDet(${di},${pi})">${esc(p.name||'')}${p.age?', '+p.age:''}</button>
          <div class="cop">${esc(p.op||'')}</div>

          <div class="cmeta">${sb}${yb}${hb}${db}${canB}</div>
        </div>
        <div style="display:flex;align-items:center;gap:2px">
          <span class="cnt">${dn}/${total}</span>
          <button class="movebtn" onclick="openMove(${di},${pi})" title="Taşı">⇄</button>
          <button class="cbtn" onclick="cancelPt(${di},${pi})" title="${p._cancelled?'İptali Kaldır':'İptal Et'}">${p._cancelled?'↩':'⊘'}</button>
          <button class="delbtn" onclick="delPt(${di},${pi})" title="Sil">🗑</button>
        </div>
      </div>
      <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
      <div class="tasks">`;
    p.tasks.forEach((t,ti)=>{
      const ak='t_'+ti,ha=alarm[ak],ts=t.replace(/'/g,"\\'");
      h+=`<div class="task${pt[ti]?' done':''}" onclick="tglChk(${di},${pi},${ti})">
        <input type="checkbox" ${pt[ti]?'checked':''} onclick="event.stopPropagation();tglChk(${di},${pi},${ti})">
        <label>${esc(t)}</label>
        ${ha?`<span class="atag" onclick="event.stopPropagation();openAlarm(${di},${pi},'${ak}','${ts}')">⏰${ha}</span>`:''}
        <span class="aico" onclick="event.stopPropagation();openAlarm(${di},${pi},'${ak}','${ts}')">🔔</span>
      </div>`;
    });
    h+=`</div>`;
    if(et.length>0){
      h+=`<div class="etasks">`;
      et.forEach((t,eti)=>{
        const ak='e_'+eti,ha=alarm[ak],ts=(t||'').replace(/'/g,"\\'");
        h+=`<div class="etask${ec[eti]?' done':''}">
          <input type="checkbox" ${ec[eti]?'checked':''} onclick="tglEx(${di},${pi},${eti})">
          <label onclick="tglEx(${di},${pi},${eti})">${esc(t)}</label>
          ${ha?`<span class="atag" onclick="openAlarm(${di},${pi},'${ak}','${ts}')">⏰${ha}</span>`:''}
          <span class="aico" onclick="openAlarm(${di},${pi},'${ak}','${ts}')">🔔</span>
          <button class="edel" onclick="delEx(${di},${pi},${eti})">×</button>
        </div>`;
      });
      h+=`</div>`;
    }
    h+=`<div class="addrow"><input class="addinp" type="text" id="nt-${di}-${pi}" placeholder="Ekstra görev..." onkeydown="if(event.key==='Enter')addEx(${di},${pi})"><button class="addbtn" onclick="addEx(${di},${pi})">+</button></div>`;
    const{pre,post,ex}=bldOrders(p);
    h+=`<div class="orders"><div class="otitle">Orderlar</div>`;
    if(pre.length){h+=`<div class="olbl">Preop:</div><div class="opills">`;pre.forEach(o=>{h+=`<span class="opill pre">${o}</span>`;});h+=`</div>`;}
    h+=`<div class="olbl">Postop 0. gün:</div><div class="opills">`;
    post.forEach(o=>{h+=`<span class="opill">${o}</span>`;});ex.forEach(o=>{h+=`<span class="opill ex">${o}</span>`;});
    h+=`</div></div>`;
    h+=`<div class="note-wrap"><textarea class="notarea" data-key="${noteKey}" placeholder="Not ekle..." oninput="noteInput(${di},${pi},this.value)" onblur="noteBlur(${di},${pi},this.value)">${esc(note)}</textarea></div>`;
    h+=`</div>`;
  });
  return h;
}

// ── Stats ─────────────────────────────────────────────────────
function renderStats(di){
  const el=document.getElementById('drstats');if(!el)return;
  let pts=[];
  if(di===-1){
    BASE.forEach((_,i)=>pts.push(...getPts(i).filter(p=>!p._cancelled)));
  } else {
    pts=getPts(di).filter(p=>!p._cancelled);
  }
  const drC={};pts.forEach(p=>{if(p.dr)drC[p.dr]=(drC[p.dr]||0)+1;});
  const prefix=di===-1?'<span style="font-size:10px;color:#888780;margin-right:4px">Toplam '+pts.length+' hasta · Dr:</span>':'<span style="font-size:10px;color:#888780;margin-right:4px">Dr:</span>';
  let h=prefix;
  if(!Object.keys(drC).length)h+='<span style="font-size:10px;color:#ccc">—</span>';
  Object.entries(drC).sort((a,b)=>b[1]-a[1]).forEach(([dr,n])=>{h+=`<span class="spill">${dr} (${n})</span>`;});
  el.innerHTML=h;
}

// ── Search ────────────────────────────────────────────────────
function doSearch(q){
  searchQ=q.trim().toLowerCase();
  const srEl=document.getElementById('sr');
  const daysEl=document.getElementById('days');
  document.getElementById('sclr').style.display=searchQ?'block':'none';
  if(!searchQ){srEl.style.display='none';daysEl.style.display='block';renderDay(curDay);return;}
  daysEl.style.display='none';srEl.style.display='block';
  const results=[];
  BASE.forEach((d,di)=>{
    getPts(di).forEach((p,pi)=>{
      if((p.name||'').toLowerCase().includes(searchQ)||(p.op||'').toLowerCase().includes(searchQ))
        results.push({di,pi,p,m:getDayMeta(di)});
    });
  });
  let h=`<div class="sr-wrap"><div class="sr-hdr">${results.length} sonuç</div>`;
  results.forEach(({di,pi,p,m})=>{
    const dc=drCls(p.dr||'');const db=p.dr?`<span class="drbdg dr-${dc}">${p.dr}</span>`:'';
    const hb=p.hbsag?'<span class="bdg hbsag">⚠️ HBsAg+</span>':'';
    const pt=fbChk(di,pi),et=fbExT(di,pi),ec=fbExC(di,pi);
    const dn=pt.filter(Boolean).length+ec.filter(Boolean).length;
    const total=pt.length+et.length;
    h+=`<div class="card" onclick="clearSearch();switchDay(${di})">
      <div class="chead">
        <div class="cinfo">
          <button class="cname" onclick="event.stopPropagation();clearSearch();switchDay(${di});setTimeout(()=>openDet(${di},${pi}),200)">${esc(p.name||'')}${p.age?', '+p.age:''}</button>
          <div class="cop">${esc(p.op||'')}</div>
          <div class="camdate">📅 ${m.label} → ${m.amdate}</div>
          <div class="cmeta">${db}${hb}</div>
        </div>
        <span class="cnt">${dn}/${total}</span>
      </div>
    </div>`;
  });
  if(!results.length)h+='<div style="color:#888780;font-size:13px">Hasta bulunamadı.</div>';
  h+=`</div>`;
  srEl.innerHTML=h;
}
function clearSearch(){searchQ='';document.getElementById('sinp').value='';document.getElementById('sclr').style.display='none';document.getElementById('sr').style.display='none';document.getElementById('days').style.display='block';renderDay(curDay);}

// ── Actions ───────────────────────────────────────────────────
async function tglChk(di,pi,ti){
  const cur=[...fbChk(di,pi)];cur[ti]=!cur[ti];
  if(S&&S.days&&S.days[di]){if(!S.days[di].checks)S.days[di].checks=[];S.days[di].checks[pi]=cur;}
  await save(`days/${di}/checks/${pi}`,cur);
}
async function tglEx(di,pi,eti){
  const cur=[...fbExC(di,pi)];cur[eti]=!cur[eti];
  if(S&&S.days&&S.days[di]){if(!S.days[di].extraChecks)S.days[di].extraChecks=[];S.days[di].extraChecks[pi]=cur;}
  await save(`days/${di}/extraChecks/${pi}`,cur);
}
async function addEx(di,pi){
  const inp=document.getElementById(`nt-${di}-${pi}`);const val=inp.value.trim();if(!val)return;
  const et=[...fbExT(di,pi),val];const ec=[...fbExC(di,pi),false];
  if(S&&S.days&&S.days[di]){if(!S.days[di].extraTasks)S.days[di].extraTasks=[];if(!S.days[di].extraChecks)S.days[di].extraChecks=[];S.days[di].extraTasks[pi]=et;S.days[di].extraChecks[pi]=ec;}
  await save(`days/${di}/extraTasks/${pi}`,et);await save(`days/${di}/extraChecks/${pi}`,ec);
}
async function delEx(di,pi,eti){
  const et=[...fbExT(di,pi)];et.splice(eti,1);const ec=[...fbExC(di,pi)];ec.splice(eti,1);
  await save(`days/${di}/extraTasks/${pi}`,et.length?et:null);await save(`days/${di}/extraChecks/${pi}`,ec.length?ec:null);
}
function noteInput(di,pi,val){clearTimeout(noteTimers[`${di}-${pi}`]);noteTimers[`${di}-${pi}`]=setTimeout(()=>noteBlur(di,pi,val),2000);}
function noteBlur(di,pi,val){
  clearTimeout(noteTimers[`${di}-${pi}`]);
  if(S&&S.days&&S.days[di]){if(!S.days[di].notes)S.days[di].notes=[];S.days[di].notes[pi]=val;}
  save(`days/${di}/notes/${pi}`,val);
}
async function delPt(di,pi){
  if(!confirm('Bu hasta silinsin mi?'))return;
  const baseCount=BASE[di]?BASE[di].patients.length:0;
  if(pi<baseCount){
    const del=[...((S&&S.days&&S.days[di]&&S.days[di].deletedBase)||[])];
    if(!del.includes(pi))del.push(pi);
    if(S&&S.days&&S.days[di])S.days[di].deletedBase=del;
    await save(`days/${di}/deletedBase`,del);
  } else {
    const added=[...((S&&S.days&&S.days[di]&&S.days[di].addedPatients)||[])];
    added.splice(pi-baseCount,1);
    if(S&&S.days&&S.days[di])S.days[di].addedPatients=added;
    await save(`days/${di}/addedPatients`,added.length?added:null);
  }
}
async function cancelPt(di,pi){
  const canc={...((S&&S.days&&S.days[di]&&S.days[di].cancelled)||{})};
  canc[pi]=!canc[pi];
  if(S&&S.days&&S.days[di])S.days[di].cancelled=canc;
  await save(`days/${di}/cancelled`,canc);
}
async function resetDay(di){
  if(!confirm('Bu günün tikleri sıfırlansın mı?'))return;
  const pts=getPts(di);
  const empty=pts.map(p=>p.tasks.map(()=>false));
  const emptyEC=pts.map(()=>[]);
  if(S&&S.days&&S.days[di]){S.days[di].checks=empty;S.days[di].extraChecks=emptyEC;}
  await save(`days/${di}/checks`,empty);await save(`days/${di}/extraChecks`,emptyEC);
}
function switchDay(di){
  curDay=di;
  // tabs: index 0 = allTab, index 1..n = day tabs
  const tabs=document.querySelectorAll('.tab');
  const days=document.querySelectorAll('.day');
  tabs.forEach((t,i)=>t.classList.toggle('active',i===di+1));
  days.forEach((d,i)=>d.classList.toggle('active',i===di+1));
  renderDay(di);renderStats(di);
}

function switchAll(){
  curDay=-1;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===0));
  document.querySelectorAll('.day').forEach((d,i)=>d.classList.toggle('active',i===BASE.length));
  renderAll2();renderStats(-1);
}

let allFilter='';

function renderAll2(){
  const el=document.getElementById('day-all');if(!el)return;
  const all=[];
  BASE.forEach((d,di)=>{
    getPts(di).forEach((p,pi)=>{
      const pt=fbChk(di,pi),et=fbExT(di,pi),ec=fbExC(di,pi);
      const dn=pt.filter(Boolean).length+ec.filter(Boolean).length;
      const total=pt.length+et.length;
      all.push({di,pi,p,dn,total,label:d.label});
    });
  });

  // Filter
  const q=allFilter.toLowerCase().trim();
  const filtered=q?all.filter(({p})=>
    (p.name||'').toLowerCase().includes(q)||
    (p.dr||'').toLowerCase().includes(q)||
    (p.op||'').toLowerCase().includes(q)
  ):all;

  // Search bar
  let h=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
    <input id="all-search" type="text" value="${esc(allFilter)}" placeholder="Ad, doktor veya ameliyat ara..."
      style="flex:1;font-size:13px;padding:7px 10px;border:.5px solid rgba(0,0,0,.15);border-radius:8px;background:#f9f9f7;font-family:inherit;color:#1a1a18;outline:none"
      oninput="allFilter=this.value;renderAll2()">
    ${allFilter?`<button onclick="allFilter='';renderAll2()" style="font-size:14px;color:#aaa;background:none;border:none;cursor:pointer;padding:0 4px">✕</button>`:''}
  </div>
  <div style="font-size:11px;color:#888780;margin-bottom:10px">${filtered.length} hasta${q?' bulundu':''}</div>`;

  if(!filtered.length){
    h+='<div style="color:#888780;font-size:13px;text-align:center;padding:2rem">Hasta bulunamadı.</div>';
    el.innerHTML=`<div style="padding:.75rem 1rem 1rem">${h}</div>`;
    return;
  }

  // Group by day (date order)
  BASE.forEach((d,di)=>{
    const dayPts=filtered.filter(x=>x.di===di);
    if(!dayPts.length)return;
    const activeCount=dayPts.filter(x=>!x.p._cancelled).length;
    h+=`<div style="font-size:12px;font-weight:600;color:#1a1a18;padding:8px 0 6px;border-bottom:.5px solid rgba(0,0,0,.1);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between">
      <span>${d.label}</span>
      <span style="font-weight:400;color:#888780;font-size:11px">${activeCount} hasta</span>
    </div>`;
    dayPts.forEach(({di,pi,p,dn,total,label})=>{
      const dc=drCls(p.dr||'');
      const db=p.dr?`<span class="drbdg dr-${dc}">${p.dr}</span>`:'';
      const hb=p.hbsag?'<span class="bdg hbsag">⚠️ HBsAg+</span>':'';
      const yb=p.ybu?'<span class="bdg ybu">YBÜ</span>':'';
      const sc=p.side==='SOL'?'sol':p.side==='SAĞ'?'sag':'';
      const sb=p.side?`<span class="bdg ${sc}">${p.side}</span>`:'';
      const canB=p._cancelled?'<span class="bdg cancelled">İptal</span>':'';
      const pct=total>0?Math.round(dn/total*100):0;
      h+=`<div class="card${p._cancelled?' cancelled-card':''}" onclick="switchDay(${di});setTimeout(()=>openDet(${di},${pi}),150)" style="cursor:pointer">
        <div class="chead">
          <div class="cinfo">
            <div style="font-size:14px;font-weight:500;${p._cancelled?'color:#aaa;':''}">${esc(p.name||'')}${p.age?', '+p.age:''}</div>
            <div class="cop">${esc(p.op||'')}</div>
            <div class="cmeta">${sb}${yb}${hb}${db}${canB}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div class="cnt">${dn}/${total}</div>
            <div style="font-size:9px;color:#aaa;margin-top:2px">${pct}%</div>
          </div>
        </div>
        <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
      </div>`;
    });
  });

  el.innerHTML=`<div style="padding:.75rem 1rem 1rem">${h}</div>`;
  // Re-focus search if was focused
  if(q){const si=document.getElementById('all-search');if(si){const l=si.value.length;si.focus();si.setSelectionRange(l,l);}}
}

// ── Move ──────────────────────────────────────────────────────
function openMove(di,pi){
  pendMove={di,pi};
  const p=getPts(di)[pi];
  document.getElementById('move-info').textContent=(p.name||'')+' → '+(p.op||'');
  const sel=document.getElementById('move-day');sel.innerHTML='';
  BASE.forEach((d,i)=>{if(i===di)return;const o=document.createElement('option');o.value=i;o.textContent=d.label+' ('+d.amdate+')';sel.appendChild(o);});
  openOv('move-ov');
}
async function confirmMove(){
  if(!pendMove)return;
  const{di,pi}=pendMove;const toDi=parseInt(document.getElementById('move-day').value);
  const pts=getPts(di);const p={...pts[pi]};delete p._bi;delete p._cancelled;p.tasks=p.tasks||bldTasks(p);
  const baseCount=BASE[di]?BASE[di].patients.length:0;
  if(pi<baseCount){
    const del=[...((S&&S.days&&S.days[di]&&S.days[di].deletedBase)||[])];
    if(!del.includes(BASE[di].patients.findIndex((_,i)=>i===pi)))del.push(pi);
    if(S&&S.days&&S.days[di])S.days[di].deletedBase=del;
    await save(`days/${di}/deletedBase`,del);
  } else {
    const added=[...((S&&S.days&&S.days[di]&&S.days[di].addedPatients)||[])];
    added.splice(pi-baseCount,1);
    if(S&&S.days&&S.days[di])S.days[di].addedPatients=added;
    await save(`days/${di}/addedPatients`,added.length?added:null);
  }
  const destAdded=[...((S&&S.days&&S.days[toDi]&&S.days[toDi].addedPatients)||[]),p];
  if(S&&S.days&&S.days[toDi])S.days[toDi].addedPatients=destAdded;
  await save(`days/${toDi}/addedPatients`,destAdded);
  closeOv('move-ov');
}

// ── Alarm ─────────────────────────────────────────────────────
function updateSelects(){
  const alSel=document.getElementById('al-day');
  if(alSel){alSel.innerHTML='';BASE.forEach((d,i)=>{const o=document.createElement('option');o.value=i;o.textContent=d.label+' — '+d.amdate;alSel.appendChild(o);});}
}
function openAlarm(di,pi,key,taskName){
  pendAlarm={di,pi,key};
  document.getElementById('al-task').value=taskName;
  document.getElementById('al-day').value=di;
  const al=fbAlarm(di,pi);
  document.getElementById('al-time').value=al[key]||'';
  document.getElementById('al-warn').style.display=('Notification'in window&&Notification.permission==='granted')?'none':'block';
  openOv('alarm-ov');
}
async function saveAlarm(){
  if(!pendAlarm)return;
  const time=document.getElementById('al-time').value;
  const day=parseInt(document.getElementById('al-day').value);
  const{pi,key}=pendAlarm;
  if(!time){alert('Lütfen saat seçin.');return;}
  if('Notification'in window&&Notification.permission!=='granted')await Notification.requestPermission();
  const al={...fbAlarm(day,pi),[key]:time};
  if(S&&S.days&&S.days[day]){if(!S.days[day].alarms)S.days[day].alarms=[];S.days[day].alarms[pi]=al;}
  await save(`days/${day}/alarms/${pi}`,al);
  schedNotif(day,pi,key,time);
  closeOv('alarm-ov');
}
async function clearAlarm(){
  if(!pendAlarm)return;
  const{di,pi,key}=pendAlarm;
  const al={...fbAlarm(di,pi)};delete al[key];
  if(S&&S.days&&S.days[di])S.days[di].alarms[pi]=al;
  await save(`days/${di}/alarms/${pi}`,Object.keys(al).length?al:null);
  closeOv('alarm-ov');
}
function schedNotif(di,pi,key,time){
  const[h,m]=time.split(':').map(Number);
  const now=new Date(),target=new Date();target.setHours(h,m,0,0);
  if(target<=now)target.setDate(target.getDate()+1);
  const delay=target-now;
  const p=getPts(di)[pi];
  const et=fbExT(di,pi);
  const tname=key.startsWith('t_')?p.tasks[parseInt(key.slice(2))]:et[parseInt(key.slice(2))]||'';
  alert(`⏰ Hatırlatıcı kuruldu!\n${p.name} — ${tname}\nSaat: ${time} (~${Math.round(delay/60000)} dk sonra)`);
  setTimeout(()=>{
    if('Notification'in window&&Notification.permission==='granted'){
      try{new Notification('KBB Servis — '+p.name,{body:tname,icon:'./icon-192.png'});}catch(e){alert('⏰ '+p.name+'\n'+tname);}
    }else{alert('⏰ '+p.name+'\n'+tname);}
  },delay);
}

// ── Add Patient ───────────────────────────────────────────────
function openAddPt(di){
  pendAddDay=di;
  ['np-ad','np-op','np-dr'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('np-yas').value='';
  document.getElementById('np-side').value='';
  ['np-ybu','np-hbsag','np-kayit','np-yfodyo','np-muller','np-foto','np-rino','np-lavaj','np-kulak','np-osas','np-tonsil','np-fess','np-boyun','np-acik','np-tiroid','np-para','np-benign','np-larenj'].forEach(id=>document.getElementById(id).checked=false);
  openOv('add-ov');
}
async function saveNewPt(){
  const name=document.getElementById('np-ad').value.trim();
  const op=document.getElementById('np-op').value.trim();
  if(!name||!op){alert('Ad ve ameliyat zorunludur.');return;}
  const sv=document.getElementById('np-side').value;

  p.tasks=bldTasks(p);
  const di=pendAddDay;
  const added=[...((S&&S.days&&S.days[di]&&S.days[di].addedPatients)||[]),p];
  if(S&&S.days&&S.days[di])S.days[di].addedPatients=added;
  await save(`days/${di}/addedPatients`,added);
  closeOv('add-ov');
}

// ── Detail ────────────────────────────────────────────────────
function openDet(di,pi){
  const p=getPts(di)[pi];const m=getDayMeta(di);
  document.getElementById('det-name').textContent=(p.name||'')+(p.age?', '+p.age:'')+(p.dr?' — '+p.dr:'');
  document.getElementById('det-op').textContent=p.op||'';
  document.getElementById('det-date').textContent='🗓 '+m.label+' yatış → '+m.amdate+' ameliyat';
  document.getElementById('det-muayene').textContent=p.muayene||'—';
  openOv('det-ov');
}

// ── Modal helpers ─────────────────────────────────────────────
function openOv(id){document.getElementById(id).classList.add('open');}
function closeOv(id){document.getElementById(id).classList.remove('open');pendAlarm=null;pendMove=null;}
async function reqNotif(){
  if(!('Notification'in window)){alert('Bu tarayıcı bildirimleri desteklemiyor.');return;}
  if(Notification.permission==='granted'){alert('✓ İzin zaten verilmiş!');return;}
  const p=await Notification.requestPermission();
  alert(p==='granted'?'✓ Bildirim izni verildi!':'❌ İzin reddedildi.');
}

// ── Login ─────────────────────────────────────────────────────
const USERS={'kbb':'servis2026','nobetci':'nobet2026'};
function doLogin(){
  const u=(document.getElementById('lu').value||'').trim().toLowerCase();
  const p=(document.getElementById('lp').value||'');
  if(USERS[u]!==undefined&&USERS[u]===p){
    try{localStorage.setItem('kbb_ok','1');}catch(e){}
    document.getElementById('lscrn').style.display='none';
    startApp();
  } else {
    document.getElementById('lerr').textContent='Kullanıcı adı veya şifre hatalı.';
    document.getElementById('lp').value='';
    document.getElementById('lp').focus();
    setTimeout(()=>{document.getElementById('lerr').textContent='';},3000);
  }
}
function startApp(){renderAll();initFb().catch(e=>console.error(e));}

// Event listeners
document.getElementById('lbtn').addEventListener('click',doLogin);
document.getElementById('lu').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('lp').focus();});
document.getElementById('lp').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

(function(){
  let ok=false;try{ok=localStorage.getItem('kbb_ok')==='1';}catch(e){}

  if(ok){ls.style.display='none';startApp();}else{ls.style.display='flex';}
})();
