const COCUK=["İlksef 1x1","Pirofen 3x1"];
const LARENJ=["Sulcid 3x2","Mucinac 3x1","Flagyl 3x1","Dengeli 2x1","İlksef 1x2","Ketavel 2x1","Lamelat 1x1","Ulcezol 1x1","Serum 4x1"];

function buildOrders(p){
  const preop=[],extra=[];let postop;
  if(p.totallarenj)return{preop,postop:[...LARENJ],extra};
  const cocuk=p.age!==null&&p.age<=12;
  if(cocuk){
    postop=[...COCUK];
    if(p.tonsil)extra.push("Gasvin 1x1");
    if(p.kulak)extra.push("Zaridinex 3x5 (aynı gün)");
    return{preop,postop,extra};
  }
  postop=[...RUTIN];
  if(p.osas){preop.push("Lamelat 1x1");extra.push("Ramadex 100mg 1x1","Dengeli 1x1","Polgyl/Flagyl 3x1");}
  if(p.tonsil)extra.push("Gasvin");
  if(p.fess)postop=postop.map(x=>x.includes("Metadem")?"Paracerol 2x1":x);
  if(p.boyun)extra.push("Flagyl 3x1");
  if(p.acik)extra.push("Cipropol 2x1");
  if(p.kulak)extra.push("Zaridinex 3x5 (aynı gün)");
  if(p.tiroid||p.paratiroid)extra.push("Qalyviz 0.5mg 2x1","Calcimax 1x1");
  if(p.tiroid&&p.benign)extra.push("Levotiron 1x1");
  return{preop,postop,extra};
}

function buildTasks(p){
  const t=["Yatış"];
  if(p.kayit)t.push("Kayıt");
  if(p.fotograf)t.push("Fotoğraf");
  if(p.rinomano)t.push("Rinomanometri");
  if(p.lavaj)t.push("Lavaj Testi");
  if(p.kulak&&p.side)t.push(`Saç Tıraşı (${p.side})`);
  if(p.isaret&&p.side)t.push(`Preop İşaret (${p.side})`);
  t.push("Ameliyat İsteği");
  t.push("Sabah Epikriz & Order");
  return t;
}

    {name:"Ahmed Hazzuri",age:4,op:"Adenoidektomi + Bilateral Kulak Kontrolü",side:null,ybu:false,kayit:false,fotograf:false,rinomano:false,lavaj:false,isaret:false,kulak:false,osas:false,tonsil:false,fess:false,boyun:false,acik:false,tiroid:false,paratiroid:false,benign:false,totallarenj:false},
    {name:"Ersin İmralı",age:47,op:"Septoplasti",side:null,ybu:false,kayit:false,fotograf:false,rinomano:true,lavaj:false,isaret:false,kulak:false,osas:false,tonsil:false,fess:false,boyun:false,acik:false,tiroid:false,paratiroid:false,benign:false,totallarenj:false},
    {name:"Meryem Ela Sarman",age:4,op:"Adenoidektomi + Bilateral VT",side:null,ybu:false,kayit:false,fotograf:false,rinomano:false,lavaj:false,isaret:false,kulak:false,osas:false,tonsil:false,fess:false,boyun:false,acik:false,tiroid:false,paratiroid:false,benign:false,totallarenj:false},
  ]},
];

baseDays.forEach(d=>d.patients.forEach(p=>{p.tasks=buildTasks(p);}));

const STORAGE_KEY='kbb_nobet_30mart_v2';

function loadData(){
  try{
    const s=localStorage.getItem(STORAGE_KEY);
    if(s)return JSON.parse(s);
  }catch(e){}
  return{
    checks:baseDays.map(d=>d.patients.map(p=>p.tasks.map(()=>false))),
    extraTasks:baseDays.map(d=>d.patients.map(()=>[])),
    extraChecks:baseDays.map(d=>d.patients.map(()=>[])),
    notes:baseDays.map(d=>d.patients.map(()=>'')),
    alarms:baseDays.map(d=>d.patients.map(()=>({}))),
    addedPatients:baseDays.map(()=>[])
  };
}

function saveData(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}catch(e){}
}

let data=loadData();
let currentDay=0;
let pendingAlarm=null;
let pendingAddDay=0;

// Merge base patients with added patients
function getDayPatients(di){
  const base=baseDays[di].patients;
  const added=(data.addedPatients[di]||[]).map(p=>{
    if(!p.tasks)p.tasks=buildTasks(p);
    return p;
  });
  return[...base,...added];
}

function renderOrders(p){
  const{preop,postop,extra}=buildOrders(p);
  let html='<div class="orders-section"><div class="orders-title">Orderlar</div>';
  if(preop.length){
    html+='<div class="orders-group"><div class="orders-group-label">Preop:</div><div class="order-pills">';
    preop.forEach(o=>{html+=`<span class="pill preop">${o}</span>`;});
    html+='</div></div>';
  }
  html+='<div class="orders-group"><div class="orders-group-label">Postop 0. gün:</div><div class="order-pills">';
  postop.forEach(o=>{html+=`<span class="pill">${o}</span>`;});
  extra.forEach(o=>{html+=`<span class="pill extra">${o}</span>`;});
  html+='</div></div></div>';
  return html;
}

function renderDay(di){
  const patients=getDayPatients(di);
  const baseCount=baseDays[di].patients.length;
  const container=document.getElementById(`day-${di}`);

  // Ensure data arrays are long enough
  while(data.checks[di].length<patients.length)data.checks[di].push(patients[data.checks[di].length].tasks.map(()=>false));
  while(data.extraTasks[di].length<patients.length)data.extraTasks[di].push([]);
  while(data.extraChecks[di].length<patients.length)data.extraChecks[di].push([]);
  while(data.notes[di].length<patients.length)data.notes[di].push('');
  while(data.alarms[di].length<patients.length)data.alarms[di].push({});

  let totalDone=0,totalTasks=0,patientsDone=0,ybuCount=0;
  patients.forEach((p,i)=>{
    const allT=data.checks[di][i].length+(data.extraTasks[di][i]||[]).length;
    const allD=data.checks[di][i].filter(Boolean).length+(data.extraChecks[di][i]||[]).filter(Boolean).length;
    totalTasks+=allT;totalDone+=allD;
    if(allD===allT)patientsDone++;
    if(p.ybu)ybuCount++;
  });

  let html=`<div class="summary">
    <div class="metric"><div class="metric-val">${totalDone}</div><div class="metric-lbl">tamamlanan</div></div>
    <div class="metric"><div class="metric-val">${totalTasks}</div><div class="metric-lbl">toplam görev</div></div>
    <div class="metric"><div class="metric-val">${patientsDone}</div><div class="metric-lbl">hazır hasta</div></div>
    <div class="metric ybu-metric"><div class="metric-val">${ybuCount}</div><div class="metric-lbl">YBÜ yeri</div></div>
  </div>`;

  if(ybuCount>0){
    const ybuNames=patients.filter(p=>p.ybu).map(p=>p.name.split(' ')[0]).join(', ');
    html+=`<div class="ybu-banner">🏥 ${ybuCount} YBÜ yeri isteniyor: ${ybuNames}</div>`;
  }

  html+=`<div class="day-actions">
    <button class="day-action-btn add" onclick="openAddPatient(${di})">+ Hasta Ekle</button>
    <button class="day-action-btn" onclick="resetDay(${di})">Günü Sıfırla</button>
  </div>`;

  patients.forEach((p,pi)=>{
    const pt=data.checks[di][pi]||p.tasks.map(()=>false);
    const et=data.extraTasks[di][pi]||[];
    const ec=data.extraChecks[di][pi]||[];
    const note=data.notes[di][pi]||'';
    const alarm=data.alarms[di][pi]||{};
    const done=pt.filter(Boolean).length+ec.filter(Boolean).length;
    const total=pt.length+et.length;
    const allDone=done===total&&total>0;
    const pct=total>0?Math.round(done/total*100):0;
    const sideClass=p.side==='SOL'?'sol':p.side==='SAĞ'?'sag':'';
    const sideBadge=p.side?`<span class="badge ${sideClass}">${p.side}</span>`:'';
    const ybuBadge=p.ybu?`<span class="badge ybu">Postop YBÜ</span>`:'';
    const isAdded=pi>=baseCount;
    const delBtn=isAdded?`<button class="del-patient-btn" onclick="deletePatient(${di},${pi})">✕</button>`:'';

    html+=`<div class="patient-card">
      <div class="patient-header">
        <div class="patient-info">
          <div class="patient-name" style="${allDone?'text-decoration:line-through;color:#888780':''}">${p.name}${p.age?', '+p.age:''} ${delBtn}</div>
          <div class="patient-op">${p.op}</div>
          <div class="patient-meta">${sideBadge}${ybuBadge}</div>
        </div>
        <span class="count-badge">${done}/${total}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="tasks">`;

    p.tasks.forEach((t,ti)=>{
      const ak=`t_${ti}`;
      const ha=alarm[ak];
      html+=`<div class="task${pt[ti]?' done':''}" onclick="toggleCheck(${di},${pi},${ti})">
        <input type="checkbox" ${pt[ti]?'checked':''} onclick="event.stopPropagation();toggleCheck(${di},${pi},${ti})">
        <label>${t}</label>
        ${ha?`<span class="task-alarm">⏰${ha}</span>`:''}
        <span style="font-size:11px;color:#ddd;cursor:pointer" onclick="event.stopPropagation();openAlarm(${di},${pi},'${ak}','${t}')">🔔</span>
      </div>`;
    });

    html+=`</div>`;

    if(et.length>0){
      html+=`<div class="extra-tasks">`;
      et.forEach((t,eti)=>{
        const ak=`e_${eti}`;
        const ha=alarm[ak];
        html+=`<div class="extra-task${ec[eti]?' done':''}">
          <input type="checkbox" ${ec[eti]?'checked':''} onclick="toggleExtra(${di},${pi},${eti})">
          <label onclick="toggleExtra(${di},${pi},${eti})">${t}</label>
          ${ha?`<span style="font-size:10px;color:#854f0b">⏰${ha}</span>`:''}
          <span style="font-size:11px;color:#ddd;cursor:pointer" onclick="openAlarm(${di},${pi},'${ak}','${t}')">🔔</span>
          <span class="extra-task-del" onclick="deleteExtra(${di},${pi},${eti})">×</span>
        </div>`;
      });
      html+=`</div>`;
    }

    html+=`<div class="add-task-row">
      <input class="add-task-input" type="text" id="nt-${di}-${pi}" placeholder="Ekstra görev ekle..." onkeydown="if(event.key==='Enter')addExtra(${di},${pi})">
      <button class="add-task-btn" onclick="addExtra(${di},${pi})">+</button>
    </div>`;

    html+=renderOrders(p);
    html+=`<textarea class="note-area" placeholder="Not ekle..." oninput="saveNote(${di},${pi},this.value)">${note}</textarea>`;
    html+=`</div>`;
  });

  container.innerHTML=html;
}

function toggleCheck(di,pi,ti){
  if(!data.checks[di][pi])data.checks[di][pi]=getDayPatients(di)[pi].tasks.map(()=>false);
  data.checks[di][pi][ti]=!data.checks[di][pi][ti];
  saveData();renderDay(di);
}

function toggleExtra(di,pi,eti){
  if(!data.extraChecks[di][pi])data.extraChecks[di][pi]=[];
  data.extraChecks[di][pi][eti]=!data.extraChecks[di][pi][eti];
  saveData();renderDay(di);
}

function addExtra(di,pi){
  const input=document.getElementById(`nt-${di}-${pi}`);
  const val=input.value.trim();if(!val)return;
  if(!data.extraTasks[di][pi])data.extraTasks[di][pi]=[];
  if(!data.extraChecks[di][pi])data.extraChecks[di][pi]=[];
  data.extraTasks[di][pi].push(val);
  data.extraChecks[di][pi].push(false);
  saveData();renderDay(di);
}

function deleteExtra(di,pi,eti){
  data.extraTasks[di][pi].splice(eti,1);
  data.extraChecks[di][pi].splice(eti,1);
  saveData();renderDay(di);
}

function saveNote(di,pi,val){
  data.notes[di][pi]=val;saveData();
}

function openAlarm(di,pi,key,taskName){
  pendingAlarm={di,pi,key};
  document.getElementById('alarm-task-name').value=taskName;
  const existing=(data.alarms[di][pi]||{})[key];
  document.getElementById('alarm-time').value=existing||'';
  document.getElementById('alarm-modal').classList.add('open');
}

function closeModal(id){
  document.getElementById(id).classList.remove('open');
  pendingAlarm=null;
}

function saveAlarm(){
  if(!pendingAlarm)return;
  const{di,pi,key}=pendingAlarm;
  const time=document.getElementById('alarm-time').value;
  if(!data.alarms[di][pi])data.alarms[di][pi]={};
  if(time){data.alarms[di][pi][key]=time;scheduleNotification(di,pi,key,time);}
  else delete data.alarms[di][pi][key];
  saveData();closeModal('alarm-modal');renderDay(di);
}

function scheduleNotification(di,pi,key,time){
  if(Notification.permission!=='granted')return;
  const[h,m]=time.split(':').map(Number);
  const now=new Date(),target=new Date();
  target.setHours(h,m,0,0);
  if(target<=now)target.setDate(target.getDate()+1);
  const delay=target-now;
  const p=getDayPatients(di)[pi];
  const taskIdx=key.startsWith('t_')?parseInt(key.slice(2)):null;
  const extraIdx=key.startsWith('e_')?parseInt(key.slice(2)):null;
  const taskName=taskIdx!==null?p.tasks[taskIdx]:(data.extraTasks[di][pi]||[])[extraIdx]||'';
  setTimeout(()=>{
    try{new Notification(`KBB — ${p.name}`,{body:taskName,icon:'./icon-192.png'});}catch(e){}
  },delay);
}

function openAddPatient(di){
  pendingAddDay=di;
  ['np-name','np-op'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('np-age').value='';
  document.getElementById('np-side').value='';
  ['np-ybu','np-kayit','np-fotograf','np-rinomano','np-lavaj','np-kulak','np-osas','np-tonsil','np-fess','np-boyun','np-acik','np-tiroid','np-paratiroid','np-benign','np-totallarenj']
    .forEach(id=>document.getElementById(id).checked=false);
  document.getElementById('add-patient-modal').classList.add('open');
}

function saveNewPatient(){
  const name=document.getElementById('np-name').value.trim();
  const op=document.getElementById('np-op').value.trim();
  if(!name||!op){alert('Ad ve ameliyat zorunludur.');return;}
  const p={
    name,op,
    age:parseInt(document.getElementById('np-age').value)||null,
    side:document.getElementById('np-side').value||null,
    ybu:document.getElementById('np-ybu').checked,
    kayit:document.getElementById('np-kayit').checked,
    fotograf:document.getElementById('np-fotograf').checked,
    rinomano:document.getElementById('np-rinomano').checked,
    lavaj:document.getElementById('np-lavaj').checked,
    isaret:!!document.getElementById('np-side').value,
    kulak:document.getElementById('np-kulak').checked,
    osas:document.getElementById('np-osas').checked,
    tonsil:document.getElementById('np-tonsil').checked,
    fess:document.getElementById('np-fess').checked,
    boyun:document.getElementById('np-boyun').checked,
    acik:document.getElementById('np-acik').checked,
    tiroid:document.getElementById('np-tiroid').checked,
    paratiroid:document.getElementById('np-paratiroid').checked,
    benign:document.getElementById('np-benign').checked,
    totallarenj:document.getElementById('np-totallarenj').checked,
  };
  p.tasks=buildTasks(p);
  if(!data.addedPatients[pendingAddDay])data.addedPatients[pendingAddDay]=[];
  data.addedPatients[pendingAddDay].push(p);
  saveData();closeModal('add-patient-modal');renderDay(pendingAddDay);
}

function deletePatient(di,pi){
  if(!confirm('Bu hasta silinsin mi?'))return;
  const baseCount=baseDays[di].patients.length;
  const addedIdx=pi-baseCount;
  data.addedPatients[di].splice(addedIdx,1);
  data.checks[di].splice(pi,1);
  data.extraTasks[di].splice(pi,1);
  data.extraChecks[di].splice(pi,1);
  data.notes[di].splice(pi,1);
  data.alarms[di].splice(pi,1);
  saveData();renderDay(di);
}

function resetDay(di){
  if(!confirm(`${baseDays[di].label} listesi sıfırlansın mı?`))return;
  data.checks[di]=baseDays[di].patients.map(p=>p.tasks.map(()=>false));
  data.extraTasks[di]=baseDays[di].patients.map(()=>[]);
  data.extraChecks[di]=baseDays[di].patients.map(()=>[]);
  data.notes[di]=baseDays[di].patients.map(()=>'');
  data.alarms[di]=baseDays[di].patients.map(()=>({}));
  data.addedPatients[di]=[];
  saveData();renderDay(di);
}

function switchDay(di){
  currentDay=di;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===di));
  document.querySelectorAll('.day').forEach((d,i)=>d.classList.toggle('active',i===di));
}

function requestNotifPermission(){
  if(!('Notification'in window)){alert('Tarayıcınız bildirimleri desteklemiyor.');return;}
  Notification.requestPermission().then(p=>{
    alert(p==='granted'?'Bildirim izni verildi!':'Bildirim izni reddedildi.');
  });
}

if('serviceWorker'in navigator){
  navigator.serviceWorker.register('./sw.js').catch(e=>console.log('SW:',e));
}

baseDays.forEach((_,di)=>renderDay(di));
</script>
</body>
</html>
