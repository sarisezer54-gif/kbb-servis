const RUTIN=["Zygosis/Ulcezol/Progas 1x1","Lamelat 1x1","Ketavel/Metadem 2x1","İlksef/Cezol 1x2","Devasid/Sulcid 3x1","İzotonik 100ml 5x1"];

const LARENJ=["Sulcid 3x2","Mucinac 3x1","Flagyl 3x1","Dengeli 2x1","İlksef 1x2","Ketavel 2x1","Lamelat 1x1","Ulcezol 1x1","Serum 4x1"];

function buildOrders(p){
  const pre=[],ex=[];let post;
  if(p.totallarenj)return{pre,post:[...LARENJ],ex};
  const kid=p.age!==null&&p.age<=12;
  if(kid){post=[...COCUK];if(p.tonsil)ex.push("Gasvin 1x1");if(p.kulak)ex.push("Zaridinex 3x5 (aynı gün)");return{pre,post,ex};}
  post=[...RUTIN];
  if(p.osas){pre.push("Lamelat 1x1");ex.push("Ramadex 100mg 1x1","Dengeli 1x1","Polgyl/Flagyl 3x1");}
  if(p.tonsil)ex.push("Gasvin");
  if(p.fess)post=post.map(x=>x.includes("Metadem")?"Paracerol 2x1":x);
  if(p.boyun)ex.push("Flagyl 3x1");
  if(p.acik)ex.push("Cipropol 2x1");
  if(p.kulak)ex.push("Zaridinex 3x5 (aynı gün)");
  if(p.tiroid||p.paratiroid)ex.push("Qalyviz 0.5mg 2x1","Calcimax 1x1");
  if(p.tiroid&&p.benign)ex.push("Levotiron 1x1");
  return{pre,post,ex};
}

function buildTasks(p){
  const t=["Yatış"];
  if(p.kayit)t.push("Kayıt");
  if(p.fotograf)t.push("Fotoğraf");
  if(p.rinomano)t.push("Rinomanometri");
  if(p.lavaj)t.push("Lavaj Testi");
  if(p.kulak&&p.side)t.push("Saç Tıraşı ("+p.side+")");
  if(p.isaret&&p.side)t.push("Preop İşaret ("+p.side+")");
  t.push("Ameliyat İsteği");
  t.push("Sabah Epikriz & Order");
  return t;
}

function getDrClass(dr){
  if(!dr)return'other';
  const clean=dr.replace(/[^A-ZÇĞİÖŞÜa-zçğışöüé]/g,'');
  const map={SG:'SG',HEÖ:'HEÖ',HEO:'HEÖ',SÇ:'SÇ',SC:'SÇ',SŞE:'SŞE',SSE:'SŞE',FÖ:'FÖ',FO:'FÖ',EK:'EK',RG:'RG',HB:'HB',GKÇ:'GKÇ',GKC:'GKÇ',MSG:'MSG'};
  return map[dr]||map[clean]||'other';
}

// ─── State ───────────────────────────────────────────────
let fbData=null, curDay=0, pendAlarm=null, pendAddDay=0;
const FB='nobet_30mart';

function setSyncDot(s){const d=document.getElementById('sync-dot');if(d)d.className='sync-dot '+s;}

function initFb(){
  setSyncDot('syncing');
  db.ref(FB).on('value',snap=>{
    const v=snap.val();
    if(v){
      fbData=v;
      // Don't re-render if user is actively typing in a note field
      const activeEl=document.activeElement;
      if(activeEl&&activeEl.classList.contains('note-area')){
        setSyncDot('synced');
      } else {
        renderAll();setSyncDot('synced');
      }
    }
    else{
      const init={weekLabel:'30 Mart – 3 Nisan 2026',days:BASE.map(d=>({label:d.label,patients:d.patients.map(p=>Object.assign({},p))})),checks:BASE.map(d=>d.patients.map(p=>p.tasks.map(()=>false))),extraTasks:BASE.map(d=>d.patients.map(()=>[])),extraChecks:BASE.map(d=>d.patients.map(()=>[])),notes:BASE.map(d=>d.patients.map(()=>'')),alarms:BASE.map(d=>d.patients.map(()=>({}))),addedPatients:BASE.map(()=>[])};
      db.ref(FB).set(init).then(()=>{fbData=init;renderAll();setSyncDot('synced');}).catch(()=>setSyncDot('error'));
    }
  },()=>setSyncDot('error'));
}

function getS(){return fbData||{weekLabel:'',days:BASE,checks:[],extraTasks:[],extraChecks:[],notes:[],alarms:[],addedPatients:[]};}
function cloneS(){return JSON.parse(JSON.stringify(getS()));}
let activeNote=null;
function saveS(s){
  setSyncDot('syncing');
  db.ref(FB).set(s).then(()=>setSyncDot('synced')).catch(()=>setSyncDot('error'));
}

function getDayPts(di){
  const s=getS();
  const base=((s.days&&s.days[di])?s.days[di].patients:BASE[di].patients).map(p=>{const c=Object.assign({},p);if(!c.tasks)c.tasks=buildTasks(c);return c;});
  const added=((s.addedPatients||[])[di]||[]).map(p=>{const c=Object.assign({},p);if(!c.tasks)c.tasks=buildTasks(c);return c;});
  return base.concat(added);
}

// ─── Stats bar ───────────────────────────────────────────
function renderStats(){
  const el=document.getElementById('stats-bar');if(!el)return;
  const drC={},opC={};
  // Always use BASE for stats to ensure dr field is present
  BASE.forEach((d,di)=>{
    d.patients.forEach(p=>{
      if(p.dr)drC[p.dr]=(drC[p.dr]||0)+1;
      const k=(p.op||'').substring(0,35);opC[k]=(opC[k]||0)+1;
    });
  });
  // Also count added patients
  const s=getS();
  (s.addedPatients||[]).forEach(arr=>(arr||[]).forEach(p=>{
    if(p&&p.dr)drC[p.dr]=(drC[p.dr]||0)+1;
    if(p&&p.op){const k=p.op.substring(0,35);opC[k]=(opC[k]||0)+1;}
  }));
  let h='<span style="font-size:10px;color:#888780;margin-right:3px">Dr:</span>';
  Object.entries(drC).sort((a,b)=>b[1]-a[1]).forEach(([dr,n])=>{
    h+=`<span class="stat-pill" style="font-weight:500">${dr} (${n})</span>`;
  });
  h+='<span style="font-size:10px;color:#888780;margin-left:6px;margin-right:3px">Op:</span>';
  Object.entries(opC).sort((a,b)=>b[1]-a[1]).filter(([,n])=>n>1).slice(0,6).forEach(([op,n])=>{
    h+=`<span class="stat-pill">${op} ×${n}</span>`;
  });
  el.innerHTML=h;
}

// ─── Render ──────────────────────────────────────────────
function renderAll(){
  const s=getS();
  const dayList=s.days||BASE;
  document.getElementById('week-label').textContent=s.weekLabel||'30 Mart – 3 Nisan 2026';
  renderStats();
  const tabsEl=document.getElementById('tabs');
  const daysEl=document.getElementById('days');
  tabsEl.innerHTML='';daysEl.innerHTML='';
  dayList.forEach((d,di)=>{
    const tab=document.createElement('div');
    tab.className='tab'+(di===curDay?' active':'');
    tab.textContent=d.label;tab.onclick=()=>switchDay(di);
    tabsEl.appendChild(tab);
    const div=document.createElement('div');
    div.id='day-'+di;div.className='day'+(di===curDay?' active':'');
    daysEl.appendChild(div);
    renderDay(di);
  });
}

function renderDay(di){
  const s=getS();
  const pts=getDayPts(di);
  const basePts=(s.days&&s.days[di])?s.days[di].patients:BASE[di].patients;
  const baseCount=basePts.length;
  const el=document.getElementById('day-'+di);if(!el)return;
  const checks=(s.checks||[])[di]||[];
  const extraT=(s.extraTasks||[])[di]||[];
  const extraC=(s.extraChecks||[])[di]||[];
  const notes=(s.notes||[])[di]||[];
  const alarms=(s.alarms||[])[di]||[];
  let td=0,tt=0,pd=0,ybu=0;
  pts.forEach((p,i)=>{
    const pt=checks[i]||p.tasks.map(()=>false);
    const et=extraT[i]||[];const ec=extraC[i]||[];
    tt+=pt.length+et.length;
    const dn=pt.filter(Boolean).length+ec.filter(Boolean).length;
    td+=dn;if(dn===pt.length+et.length&&pt.length+et.length>0)pd++;
    if(p.ybu)ybu++;
  });
  let h=`<div class="summary">
    <div class="metric"><div class="metric-val">${td}</div><div class="metric-lbl">tamamlanan</div></div>
    <div class="metric"><div class="metric-val">${tt}</div><div class="metric-lbl">toplam görev</div></div>
    <div class="metric"><div class="metric-val">${pd}</div><div class="metric-lbl">hazır hasta</div></div>
    <div class="metric ybu-m"><div class="metric-val">${ybu}</div><div class="metric-lbl">YBÜ yeri</div></div>
  </div>`;
  if(ybu>0){
    const names=pts.filter(p=>p.ybu).map(p=>p.name.split(' ')[0]).join(', ');
    h+=`<div class="ybu-banner">🏥 ${ybu} YBÜ yeri: ${names}</div>`;
  }
  h+=`<div class="day-actions">
    <button class="day-btn add" onclick="openAddPatient(${di})">+ Hasta Ekle</button>
    <button class="day-btn" onclick="resetDay(${di})">Günü Sıfırla</button>
  </div>`;

  pts.forEach((p,pi)=>{
    const pt=checks[pi]||p.tasks.map(()=>false);
    const et=extraT[pi]||[];const ec=extraC[pi]||[];
    const note=notes[pi]||'';const alarm=alarms[pi]||{};
    const dn=pt.filter(Boolean).length+ec.filter(Boolean).length;
    const total=pt.length+et.length;
    const done=dn===total&&total>0;
    const pct=total>0?Math.round(dn/total*100):0;
    const sc=p.side==='SOL'?'sol':p.side==='SAĞ'?'sag':'';
    const sb=p.side?`<span class="badge ${sc}">${p.side}</span>`:'';
    const yb=p.ybu?'<span class="badge ybu">Postop YBÜ</span>':'';
    const drCls=getDrClass(p.dr||'');
    const drB=p.dr?`<span class="dr-badge dr-${drCls}">${p.dr}</span>`:'';
    const delB=`<button class="del-btn" onclick="deletePatient(${di},${pi})" title="Sil">🗑</button>`;

    h+=`<div class="patient-card">
      <div class="p-header">
        <div class="p-info">
          <div><span class="p-name" style="${done?'text-decoration:line-through;color:#888780':''}" onclick="openDetail(${di},${pi})">${p.name||''}${p.age?', '+p.age:''}</span></div>
          <div class="p-op">${p.op||''}</div>
          <div class="p-meta">${sb}${yb}${drB}</div>
        </div>
        <div style="display:flex;align-items:center;gap:4px">
          <span class="count">${dn}/${total}</span>
          ${delB}
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="tasks">`;

    p.tasks.forEach((t,ti)=>{
      const ak='t_'+ti;const ha=alarm[ak];
      h+=`<div class="task${pt[ti]?' done':''}" onclick="toggleCheck(${di},${pi},${ti})">
        <input type="checkbox" ${pt[ti]?'checked':''} onclick="event.stopPropagation();toggleCheck(${di},${pi},${ti})">
        <label>${t}</label>
        ${ha?`<span class="alarm-tag" onclick="event.stopPropagation();openAlarm(${di},${pi},'${ak}','${t.replace(/'/g,"\\'")}')">⏰${ha}</span>`:''}
        <span class="alarm-icon" onclick="event.stopPropagation();openAlarm(${di},${pi},'${ak}','${t.replace(/'/g,"\\'")}')">🔔</span>
      </div>`;
    });
    h+=`</div>`;

    if(et.length>0){
      h+=`<div class="extra-tasks">`;
      et.forEach((t,eti)=>{
        const ak='e_'+eti;const ha=alarm[ak];
        h+=`<div class="extra-task${ec[eti]?' done':''}">
          <input type="checkbox" ${ec[eti]?'checked':''} onclick="toggleExtra(${di},${pi},${eti})">
          <label onclick="toggleExtra(${di},${pi},${eti})">${t}</label>
          ${ha?`<span class="alarm-tag" onclick="openAlarm(${di},${pi},'${ak}','${t.replace(/'/g,"\\'")}')">⏰${ha}</span>`:''}
          <span class="alarm-icon" onclick="openAlarm(${di},${pi},'${ak}','${t.replace(/'/g,"\\'")}')">🔔</span>
          <span class="extra-del" onclick="deleteExtra(${di},${pi},${eti})">×</span>
        </div>`;
      });
      h+=`</div>`;
    }

    h+=`<div class="add-row">
      <input class="add-input" type="text" id="nt-${di}-${pi}" placeholder="Ekstra görev ekle..." onkeydown="if(event.key==='Enter')addExtra(${di},${pi})">
      <button class="add-btn" onclick="addExtra(${di},${pi})">+</button>
    </div>`;

    // Orders
    const{pre,post,ex}=buildOrders(p);
    h+=`<div class="orders-sec"><div class="orders-title">Orderlar</div>`;
    if(pre.length){h+=`<div class="orders-lbl">Preop:</div><div class="order-pills">`;pre.forEach(o=>{h+=`<span class="pill pre">${o}</span>`;});h+=`</div>`;}
    h+=`<div class="orders-lbl">Postop 0. gün:</div><div class="order-pills">`;
    post.forEach(o=>{h+=`<span class="pill">${o}</span>`;});
    ex.forEach(o=>{h+=`<span class="pill ex">${o}</span>`;});
    h+=`</div></div>`;

    h+=`<textarea class="note-area" placeholder="Not ekle..." id="note-${di}-${pi}" oninput="saveNote(${di},${pi},this.value)">${note}</textarea>`;
    h+=`</div>`;
  });

  el.innerHTML=h;
}

// ─── Actions ─────────────────────────────────────────────
function toggleCheck(di,pi,ti){
  const s=cloneS();
  if(!s.checks[di])s.checks[di]=[];
  if(!s.checks[di][pi])s.checks[di][pi]=getDayPts(di)[pi].tasks.map(()=>false);
  s.checks[di][pi][ti]=!s.checks[di][pi][ti];
  saveS(s);
}

function toggleExtra(di,pi,eti){
  const s=cloneS();
  if(!s.extraChecks[di][pi])s.extraChecks[di][pi]=[];
  s.extraChecks[di][pi][eti]=!s.extraChecks[di][pi][eti];
  saveS(s);
}

function addExtra(di,pi){
  const inp=document.getElementById(`nt-${di}-${pi}`);
  const val=inp.value.trim();if(!val)return;
  const s=cloneS();
  if(!s.extraTasks[di][pi])s.extraTasks[di][pi]=[];
  if(!s.extraChecks[di][pi])s.extraChecks[di][pi]=[];
  s.extraTasks[di][pi].push(val);
  s.extraChecks[di][pi].push(false);
  saveS(s);
}

function deleteExtra(di,pi,eti){
  const s=cloneS();
  s.extraTasks[di][pi].splice(eti,1);
  s.extraChecks[di][pi].splice(eti,1);
  saveS(s);
}

let noteTimer=null;
function saveNote(di,pi,val){
  clearTimeout(noteTimer);
  noteTimer=setTimeout(()=>{
    const s=cloneS();
    if(!s.notes[di])s.notes[di]=[];
    s.notes[di][pi]=val;
    saveS(s);
  },1500);
}

function deletePatient(di,pi){
  event.stopPropagation();
  if(!confirm('Bu hasta silinsin mi?'))return;
  const s=cloneS();
  const basePts=(s.days&&s.days[di])?s.days[di].patients:BASE[di].patients;
  if(pi<basePts.length){
    if(!s.days[di])s.days[di]={label:BASE[di].label,patients:BASE[di].patients.map(p=>Object.assign({},p))};
    s.days[di].patients.splice(pi,1);
  } else {
    if(s.addedPatients[di])s.addedPatients[di].splice(pi-basePts.length,1);
  }
  if(s.checks[di])s.checks[di].splice(pi,1);
  if(s.extraTasks[di])s.extraTasks[di].splice(pi,1);
  if(s.extraChecks[di])s.extraChecks[di].splice(pi,1);
  if(s.notes[di])s.notes[di].splice(pi,1);
  if(s.alarms[di])s.alarms[di].splice(pi,1);
  saveS(s);
}

function resetDay(di){
  if(!confirm('Bu günün tüm tikleri sıfırlansın mı?'))return;
  const s=cloneS();
  const bp=(s.days&&s.days[di])?s.days[di].patients:BASE[di].patients;
  // Reset only checks, keep notes and extra tasks
  s.checks[di]=bp.map(p=>{const c=Object.assign({},p);if(!c.tasks)c.tasks=buildTasks(c);return c.tasks.map(()=>false);});
  if(s.extraChecks[di])s.extraChecks[di]=s.extraChecks[di].map(arr=>(arr||[]).map(()=>false));
  saveS(s);
}

function switchDay(di){
  curDay=di;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===di));
  document.querySelectorAll('.day').forEach((d,i)=>d.classList.toggle('active',i===di));
}

// ─── Alarm ───────────────────────────────────────────────
function openAlarm(di,pi,key,taskName){
  pendAlarm={di,pi,key};
  document.getElementById('al-task').value=taskName;
  document.getElementById('al-day').value=di;
  const ex=((getS().alarms||[])[di]||[])[pi]||{};
  document.getElementById('al-time').value=ex[key]||'';
  openModal('alarm-modal');
}

function saveAlarm(){
  if(!pendAlarm)return;
  const{di,pi,key}=pendAlarm;
  const time=document.getElementById('al-time').value;
  const day=parseInt(document.getElementById('al-day').value);
  if(!time){alert('Lütfen saat seçin.');return;}
  const s=cloneS();
  if(!s.alarms[day])s.alarms[day]=[];
  if(!s.alarms[day][pi])s.alarms[day][pi]={};
  s.alarms[day][pi][key]=time;
  saveS(s);
  schedNotif(day,pi,key,time);
  closeModal('alarm-modal');
}

function clearAlarm(){
  if(!pendAlarm)return;
  const{di,pi,key}=pendAlarm;
  const s=cloneS();
  if(s.alarms[di]&&s.alarms[di][pi])delete s.alarms[di][pi][key];
  saveS(s);closeModal('alarm-modal');
}

function schedNotif(di,pi,key,time){
  if(Notification.permission!=='granted')return;
  const[h,m]=time.split(':').map(Number);
  const now=new Date(),target=new Date();
  target.setHours(h,m,0,0);
  if(target<=now)target.setDate(target.getDate()+1);
  const p=getDayPts(di)[pi];
  const s=getS();
  const tname=key.startsWith('t_')?p.tasks[parseInt(key.slice(2))]:((s.extraTasks[di]||[])[pi]||[])[parseInt(key.slice(2))]||'';
  setTimeout(()=>{try{new Notification('KBB — '+p.name,{body:tname,icon:'./icon-192.png'});}catch(e){}},target-now);
}

// ─── Add patient ─────────────────────────────────────────
function openAddPatient(di){
  pendAddDay=di;
  ['np-name','np-op','np-dr'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('np-age').value='';
  document.getElementById('np-side').value='';
  ['np-ybu','np-kayit','np-foto','np-rino','np-lavaj','np-kulak','np-osas','np-tonsil','np-fess','np-boyun','np-acik','np-tiroid','np-paratiroid','np-benign','np-larenj'].forEach(id=>document.getElementById(id).checked=false);
  openModal('add-modal');
}

function savePatient(){
  const name=document.getElementById('np-name').value.trim();
  const op=document.getElementById('np-op').value.trim();
  if(!name||!op){alert('Ad ve ameliyat zorunludur.');return;}
  const sv=document.getElementById('np-side').value;
  const p={name,op,dr:document.getElementById('np-dr').value.trim().toUpperCase()||null,age:parseInt(document.getElementById('np-age').value)||null,side:sv||null,ybu:document.getElementById('np-ybu').checked,kayit:document.getElementById('np-kayit').checked,fotograf:document.getElementById('np-foto').checked,rinomano:document.getElementById('np-rino').checked,lavaj:document.getElementById('np-lavaj').checked,isaret:!!sv,kulak:document.getElementById('np-kulak').checked,osas:document.getElementById('np-osas').checked,tonsil:document.getElementById('np-tonsil').checked,fess:document.getElementById('np-fess').checked,boyun:document.getElementById('np-boyun').checked,acik:document.getElementById('np-acik').checked,tiroid:document.getElementById('np-tiroid').checked,paratiroid:document.getElementById('np-paratiroid').checked,benign:document.getElementById('np-benign').checked,totallarenj:document.getElementById('np-larenj').checked,muayene:''};
  p.tasks=buildTasks(p);
  const s=cloneS();
  if(!s.addedPatients[pendAddDay])s.addedPatients[pendAddDay]=[];
  s.addedPatients[pendAddDay].push(p);
  s.checks[pendAddDay].push(p.tasks.map(()=>false));
  s.extraTasks[pendAddDay].push([]);
  s.extraChecks[pendAddDay].push([]);
  s.notes[pendAddDay].push('');
  s.alarms[pendAddDay].push({});
  saveS(s);closeModal('add-modal');
}

// ─── Detail ──────────────────────────────────────────────
function openDetail(di,pi){
  const p=getDayPts(di)[pi];
  document.getElementById('det-name').textContent=(p.name||'')+(p.age?', '+p.age:'')+(p.dr?' — '+p.dr:'');
  document.getElementById('det-op').textContent=p.op||'';
  document.getElementById('det-muayene').textContent=p.muayene||'—';
  openModal('detail-modal');
}

// ─── PDF ─────────────────────────────────────────────────
async function handlePdf(event){
  const file=event.target.files[0];if(!file)return;
  const st=document.getElementById('pdf-status');
  st.style.display='block';st.className='pstatus loading';st.textContent='PDF okunuyor...';
  try{
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=()=>rej(new Error('Okunamadı'));r.readAsDataURL(file);});
    document.getElementById('load-txt').textContent='Ameliyat listesi oluşturuluyor...';
    document.getElementById('load-ov').classList.add('open');
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:6000,messages:[{role:'user',content:[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:'Bu KBB ameliyat listesi PDF\'inden hasta listesini çıkar. Sadece JSON döndür.\n\nKurallar:\n- Timpanoplasti/Miringoplasti/DSR/DL/Tiroid/Paratiroid/Boyun dis/LAP → kayit:true\n- Açık teknik septoplasti → fotograf:true, rinomano:true, acik:true\n- Standart septoplasti → rinomano:true\n- DSR → lavaj:true\n- Kulak ameliyatı → kulak:true\n- OSAS/Uyku cerrahisi → osas:true\n- Tonsillektomi → tonsil:true\n- FESS → fess:true\n- Boyun diseksiyonu → boyun:true\n- Tiroid → tiroid:true (malign ise benign:false)\n- Paratiroid → paratiroid:true\n- Total larenjektomi → totallarenj:true\n- Sağ/Sol → side:"SAĞ"/"SOL", isaret:true\n- Postop YBÜ → ybu:true\n- dr: ameliyat listesindeki doktor kısaltması (SG, HEÖ, SÇ vs.)\n- muayene: PDF deki muayene/tetkik notları (kısaltma değil tam metin)\n\nFormat:\n{"weekLabel":"30 Mart - 3 Nisan 2026","days":[{"label":"Pzt 30/3","patients":[{"name":"...","age":32,"dr":"FÖ","op":"...","side":"SOL","ybu":false,"kayit":true,"fotograf":false,"rinomano":false,"lavaj":false,"isaret":true,"kulak":true,"osas":false,"tonsil":false,"fess":false,"boyun":false,"acik":false,"tiroid":false,"paratiroid":false,"benign":false,"totallarenj":false,"muayene":"..."}]}]}'}]}]})});
    const data=await resp.json();
    const text=data.content.map(c=>c.text||'').join('');
    const clean=text.replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(clean);
    parsed.days.forEach(d=>d.patients.forEach(p=>{p.tasks=buildTasks(p);}));
    const ns={weekLabel:parsed.weekLabel,days:parsed.days,checks:parsed.days.map(d=>d.patients.map(p=>p.tasks.map(()=>false))),extraTasks:parsed.days.map(d=>d.patients.map(()=>[])),extraChecks:parsed.days.map(d=>d.patients.map(()=>[])),notes:parsed.days.map(d=>d.patients.map(()=>'')),alarms:parsed.days.map(d=>d.patients.map(()=>({}))),addedPatients:parsed.days.map(()=>[])};
    db.ref(FB).set(ns).then(()=>{document.getElementById('load-ov').classList.remove('open');st.className='pstatus ok';st.textContent='✓ '+parsed.weekLabel+' oluşturuldu! '+parsed.days.reduce((a,d)=>a+d.patients.length,0)+' hasta.';curDay=0;closeModal('pdf-modal');}).catch(e=>{document.getElementById('load-ov').classList.remove('open');st.className='pstatus err';st.textContent='Kayıt hatası: '+e.message;});
  }catch(e){document.getElementById('load-ov').classList.remove('open');st.className='pstatus err';st.textContent='Hata: '+e.message;}
  event.target.value='';
}

// ─── Helpers ─────────────────────────────────────────────
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');pendAlarm=null;}
function reqNotif(){
  if(!('Notification'in window)){alert('Bildirim desteklenmiyor.');return;}
  Notification.requestPermission().then(p=>alert(p==='granted'?'Bildirim izni verildi!':'Reddedildi.'));
}

if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
renderAll();
initFb();
