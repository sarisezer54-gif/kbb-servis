// ── State ───────────────────────────────────────────────────
let S=null; // Firebase data
let curDay=0,pendAlarm=null,pendAddDay=0;
const FB='nobet_30mart';
let noteTimers={};

function sd(s){const d=document.getElementById('sd');if(d)d.className='sd '+s;}

// ── Firebase ─────────────────────────────────────────────────
function initFb(){
  sd('wait');
  db.ref(FB).on('value',snap=>{
    const v=snap.val();
    if(v){
      S=v;
      renderAll();
      sd('on');
    } else {
      // First run - initialize from BASE
      const init={
        weekLabel:'30 Mart – 3 Nisan 2026',
        checks:BASE.map(d=>d.patients.map(p=>p.tasks.map(()=>false))),
        extraTasks:BASE.map(d=>d.patients.map(()=>[])),
        extraChecks:BASE.map(d=>d.patients.map(()=>[])),
        notes:BASE.map(d=>d.patients.map(()=>'')),
        alarms:BASE.map(d=>d.patients.map(()=>({}))),
        addedPatients:BASE.map(()=>[])
      };
      db.ref(FB).set(init)
        .then(()=>{S=init;renderAll();sd('on');})
        .catch(()=>sd('err'));
    }
  },err=>{console.error(err);sd('err');});
}

// Always get patients from BASE (for dr/muayene), merge checks from Firebase
function getPts(di){
  const base=BASE[di].patients.map((p,i)=>{
    return {...p}; // Always fresh from BASE = always has dr + muayene
  });
  // Add any extra patients added at runtime
  const added=((S&&S.addedPatients&&S.addedPatients[di])||[]).map(p=>{
    const c={...p};if(!c.tasks)c.tasks=bldTasks(c);return c;
  });
  return [...base,...added];
}

function getChecks(di,pi){return(S&&S.checks&&S.checks[di]&&S.checks[di][pi])||getPts(di)[pi].tasks.map(()=>false);}
function getExtraT(di,pi){return(S&&S.extraTasks&&S.extraTasks[di]&&S.extraTasks[di][pi])||[];}
function getExtraC(di,pi){return(S&&S.extraChecks&&S.extraChecks[di]&&S.extraChecks[di][pi])||[];}
function getNote(di,pi){return(S&&S.notes&&S.notes[di]&&S.notes[di][pi]!==undefined)?S.notes[di][pi]:'';}
function getAlarm(di,pi){return(S&&S.alarms&&S.alarms[di]&&S.alarms[di][pi])||{};}

function saveField(path,val){
  sd('wait');
  db.ref(FB+'/'+path).set(val)
    .then(()=>sd('on'))
    .catch(()=>sd('err'));
}

// ── Stats ────────────────────────────────────────────────────
function renderStats(di){
  const el=document.getElementById('drstats');if(!el)return;
  const pts=getPts(di);
  const drC={};
  pts.forEach(p=>{if(p.dr)drC[p.dr]=(drC[p.dr]||0)+1;});
  let h='<span style="font-size:10px;color:#888780;margin-right:4px">Doktorlar:</span>';
  if(!Object.keys(drC).length)h+='<span style="font-size:10px;color:#ccc">—</span>';
  Object.entries(drC).sort((a,b)=>b[1]-a[1]).forEach(([dr,n])=>{
    h+=`<span class="spill">${dr} (${n})</span>`;
  });
  el.innerHTML=h;
}

// ── Render ───────────────────────────────────────────────────
function renderAll(){
  document.getElementById('wlbl').textContent=(S&&S.weekLabel)||'30 Mart – 3 Nisan 2026';
  const tabsEl=document.getElementById('tabs');
  const daysEl=document.getElementById('days');
  tabsEl.innerHTML='';daysEl.innerHTML='';
  BASE.forEach((d,di)=>{
    const tab=document.createElement('div');
    tab.className='tab'+(di===curDay?' active':'');
    tab.textContent=d.label;
    tab.onclick=()=>switchDay(di);
    tabsEl.appendChild(tab);
    const div=document.createElement('div');
    div.id='day-'+di;
    div.className='day'+(di===curDay?' active':'');
    daysEl.appendChild(div);
    renderDay(di);
  });
  renderStats(curDay);
}

function renderDay(di){
  const pts=getPts(di);
  const baseCount=BASE[di].patients.length;
  const el=document.getElementById('day-'+di);if(!el)return;

  // Preserve active note values before re-render
  const savedNotes={};
  el.querySelectorAll('.notarea').forEach(ta=>{
    if(document.activeElement===ta||ta.value!==ta.defaultValue){
      savedNotes[ta.dataset.key]=ta.value;
    }
  });

  let td=0,tt=0,pd=0,ybu=0;
  pts.forEach((p,i)=>{
    const pt=getChecks(di,i);
    const et=getExtraT(di,i);
    const ec=getExtraC(di,i);
    tt+=pt.length+et.length;
    const dn=pt.filter(Boolean).length+ec.filter(Boolean).length;
    td+=dn;
    if(dn===pt.length+et.length&&pt.length+et.length>0)pd++;
    if(p.ybu)ybu++;
  });

  let h=`<div class="sumrow">
    <div class="met"><div class="met-v">${td}</div><div class="met-l">tamamlanan</div></div>
    <div class="met"><div class="met-v">${tt}</div><div class="met-l">toplam görev</div></div>
    <div class="met"><div class="met-v">${pd}</div><div class="met-l">hazır hasta</div></div>
    <div class="met red"><div class="met-v">${ybu}</div><div class="met-l">YBÜ yeri</div></div>
  </div>`;
  if(ybu>0){
    const names=pts.filter(p=>p.ybu).map(p=>p.name.split(' ')[0]).join(', ');
    h+=`<div class="ybubar">🏥 ${ybu} YBÜ yeri: ${names}</div>`;
  }
  h+=`<div class="dayacts">
    <button class="dbtn add" onclick="openAddPt(${di})">+ Hasta Ekle</button>
    <button class="dbtn" onclick="resetDay(${di})">Günü Sıfırla</button>
  </div>`;

  pts.forEach((p,pi)=>{
    const pt=getChecks(di,pi);
    const et=getExtraT(di,pi);
    const ec=getExtraC(di,pi);
    const alarm=getAlarm(di,pi);
    const noteKey=`${di}-${pi}`;
    const note=savedNotes[noteKey]!==undefined?savedNotes[noteKey]:getNote(di,pi);
    const dn=pt.filter(Boolean).length+ec.filter(Boolean).length;
    const total=pt.length+et.length;
    const done=dn===total&&total>0;
    const pct=total>0?Math.round(dn/total*100):0;
    const sc=p.side==='SOL'?'sol':p.side==='SAĞ'?'sag':'';
    const sb=p.side?`<span class="bdg ${sc}">${p.side}</span>`:'';
    const yb=p.ybu?'<span class="bdg ybu">Postop YBÜ</span>':'';
    const dc=drCls(p.dr||'');
    const db2=p.dr?`<span class="drbdg dr-${dc}">${p.dr}</span>`:'';

    h+=`<div class="card">
      <div class="chead">
        <div class="cinfo">
          <div><button class="cname" style="${done?'text-decoration:line-through;color:#888780':''}" onclick="openDet(${di},${pi})">${p.name||''}${p.age?', '+p.age:''}</button></div>
          <div class="cop">${p.op||''}</div>
          <div class="cmeta">${sb}${yb}${db2}</div>
        </div>
        <div style="display:flex;align-items:center;gap:4px">
          <span class="cnt">${dn}/${total}</span>
          <button class="delbtn" onclick="delPt(${di},${pi})">🗑</button>
        </div>
      </div>
      <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
      <div class="tasks">`;

    p.tasks.forEach((t,ti)=>{
      const ak='t_'+ti;const ha=alarm[ak];
      const ts=t.replace(/'/g,"\\'");
      h+=`<div class="task${pt[ti]?' done':''}" onclick="tglChk(${di},${pi},${ti})">
        <input type="checkbox" ${pt[ti]?'checked':''} onclick="event.stopPropagation();tglChk(${di},${pi},${ti})">
        <label>${t}</label>
        ${ha?`<span class="atag" onclick="event.stopPropagation();openAlarm(${di},${pi},'${ak}','${ts}')">⏰${ha}</span>`:''}
        <span class="aico" onclick="event.stopPropagation();openAlarm(${di},${pi},'${ak}','${ts}')">🔔</span>
      </div>`;
    });
    h+=`</div>`;

    if(et.length>0){
      h+=`<div class="etasks">`;
      et.forEach((t,eti)=>{
        const ak='e_'+eti;const ha=alarm[ak];const ts=t.replace(/'/g,"\\'");
        h+=`<div class="etask${ec[eti]?' done':''}">
          <input type="checkbox" ${ec[eti]?'checked':''} onclick="tglEx(${di},${pi},${eti})">
          <label onclick="tglEx(${di},${pi},${eti})">${t}</label>
          ${ha?`<span class="atag" onclick="openAlarm(${di},${pi},'${ak}','${ts}')">⏰${ha}</span>`:''}
          <span class="aico" onclick="openAlarm(${di},${pi},'${ak}','${ts}')">🔔</span>
          <button class="edel" onclick="delEx(${di},${pi},${eti})">×</button>
        </div>`;
      });
      h+=`</div>`;
    }

    h+=`<div class="addrow">
      <input class="addinp" type="text" id="nt-${di}-${pi}" placeholder="Ekstra görev ekle..." onkeydown="if(event.key==='Enter')addEx(${di},${pi})">
      <button class="addbtn" onclick="addEx(${di},${pi})">+</button>
    </div>`;

    const{pre,post,ex}=bldOrders(p);
    h+=`<div class="orders"><div class="otitle">Orderlar</div>`;
    if(pre.length){h+=`<div class="olbl">Preop:</div><div class="opills">`;pre.forEach(o=>{h+=`<span class="opill pre">${o}</span>`;});h+=`</div>`;}
    h+=`<div class="olbl">Postop 0. gün:</div><div class="opills">`;
    post.forEach(o=>{h+=`<span class="opill">${o}</span>`;});
    ex.forEach(o=>{h+=`<span class="opill ex">${o}</span>`;});
    h+=`</div></div>`;

    // Note textarea - use data-key to preserve value
    h+=`<div class="note-wrap"><textarea class="notarea" data-key="${noteKey}" placeholder="Not ekle..."
      oninput="noteInput(${di},${pi},this.value)"
      onblur="noteBlur(${di},${pi},this.value)">${escHtml(note)}</textarea></div>`;
    h+=`</div>`;
  });

  el.innerHTML=h;

  // Restore focus if a note was active
  const activeKey=Object.keys(savedNotes)[0];
  if(activeKey){
    const ta=el.querySelector(`textarea[data-key="${activeKey}"]`);
    if(ta){ta.focus();const len=ta.value.length;ta.setSelectionRange(len,len);}
  }
}

function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── Note handling (no full re-render) ───────────────────────
function noteInput(di,pi,val){
  clearTimeout(noteTimers[`${di}-${pi}`]);
  noteTimers[`${di}-${pi}`]=setTimeout(()=>saveField(`notes/${di}/${pi}`,val),2000);
}

function noteBlur(di,pi,val){
  clearTimeout(noteTimers[`${di}-${pi}`]);
  saveField(`notes/${di}/${pi}`,val);
  // Update local state without re-render
  if(S){
    if(!S.notes)S.notes=[];
    if(!S.notes[di])S.notes[di]=[];
    S.notes[di][pi]=val;
  }
}

// ── Actions ──────────────────────────────────────────────────
function tglChk(di,pi,ti){
  const cur=getChecks(di,pi);
  cur[ti]=!cur[ti];
  saveField(`checks/${di}/${pi}`,cur);
  if(S){if(!S.checks)S.checks=[];if(!S.checks[di])S.checks[di]=[];S.checks[di][pi]=cur;}
}

function tglEx(di,pi,eti){
  const cur=[...getExtraC(di,pi)];
  cur[eti]=!cur[eti];
  saveField(`extraChecks/${di}/${pi}`,cur);
  if(S){if(!S.extraChecks)S.extraChecks=[];if(!S.extraChecks[di])S.extraChecks[di]=[];S.extraChecks[di][pi]=cur;}
}

function addEx(di,pi){
  const inp=document.getElementById(`nt-${di}-${pi}`);
  const val=inp.value.trim();if(!val)return;
  const et=[...getExtraT(di,pi),val];
  const ec=[...getExtraC(di,pi),false];
  saveField(`extraTasks/${di}/${pi}`,et);
  saveField(`extraChecks/${di}/${pi}`,ec);
  if(S){
    if(!S.extraTasks)S.extraTasks=[];if(!S.extraTasks[di])S.extraTasks[di]=[];S.extraTasks[di][pi]=et;
    if(!S.extraChecks)S.extraChecks=[];if(!S.extraChecks[di])S.extraChecks[di]=[];S.extraChecks[di][pi]=ec;
  }
}

function delEx(di,pi,eti){
  const et=[...getExtraT(di,pi)];et.splice(eti,1);
  const ec=[...getExtraC(di,pi)];ec.splice(eti,1);
  saveField(`extraTasks/${di}/${pi}`,et.length?et:null);
  saveField(`extraChecks/${di}/${pi}`,ec.length?ec:null);
}

function delPt(di,pi){
  if(!confirm('Bu hasta silinsin mi?'))return;
  const baseCount=BASE[di].patients.length;
  if(pi<baseCount){
    // Can't delete base patients permanently, just mark as hidden
    alert('Orijinal hastalar silinemez. Ekstra eklenen hastalar silinebilir.');
    return;
  }
  const addedIdx=pi-baseCount;
  const added=[...((S&&S.addedPatients&&S.addedPatients[di])||[])];
  added.splice(addedIdx,1);
  saveField(`addedPatients/${di}`,added.length?added:null);
  if(S){if(!S.addedPatients)S.addedPatients=[];S.addedPatients[di]=added;}
}

function resetDay(di){
  if(!confirm('Bu günün tüm tikleri sıfırlansın mı?\n(Notlar ve ekstra görevler korunur)'))return;
  const pts=getPts(di);
  const emptyChecks=pts.slice(0,BASE[di].patients.length).map(p=>p.tasks.map(()=>false));
  saveField(`checks/${di}`,emptyChecks);
  if(S){if(!S.checks)S.checks=[];S.checks[di]=emptyChecks;}
  // Reset extra checks too
  const emptyEC=BASE[di].patients.map(()=>[]);
  saveField(`extraChecks/${di}`,emptyEC);
  if(S){if(!S.extraChecks)S.extraChecks=[];S.extraChecks[di]=emptyEC;}
}

function switchDay(di){
  curDay=di;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===di));
  document.querySelectorAll('.day').forEach((d,i)=>d.classList.toggle('active',i===di));
  renderStats(di);
}

// ── Alarm ─────────────────────────────────────────────────────
function openAlarm(di,pi,key,taskName){
  pendAlarm={di,pi,key};
  document.getElementById('al-task').value=taskName;
  document.getElementById('al-day').value=di;
  const al=getAlarm(di,pi);
  document.getElementById('al-time').value=al[key]||'';
  openOv('alarm-ov');
}

function saveAlarm(){
  if(!pendAlarm)return;
  const time=document.getElementById('al-time').value;
  const day=parseInt(document.getElementById('al-day').value);
  const{pi,key}=pendAlarm;
  if(!time){alert('Lütfen saat seçin.');return;}
  const al={...getAlarm(day,pi)};
  al[key]=time;
  saveField(`alarms/${day}/${pi}`,al);
  if(S){if(!S.alarms)S.alarms=[];if(!S.alarms[day])S.alarms[day]=[];S.alarms[day][pi]=al;}
  schedNotif(day,pi,key,time);
  closeOv('alarm-ov');
}

function clearAlarm(){
  if(!pendAlarm)return;
  const{di,pi,key}=pendAlarm;
  const al={...getAlarm(di,pi)};
  delete al[key];
  saveField(`alarms/${di}/${pi}`,Object.keys(al).length?al:null);
  if(S&&S.alarms&&S.alarms[di])S.alarms[di][pi]=al;
  closeOv('alarm-ov');
}

function schedNotif(di,pi,key,time){
  if(!('Notification'in window)){alert('Bildirim bu tarayıcıda desteklenmiyor.');return;}
  if(Notification.permission!=='granted'){
    Notification.requestPermission().then(p=>{if(p==='granted')schedNotif(di,pi,key,time);});
    return;
  }
  const[h,m]=time.split(':').map(Number);
  const now=new Date(),target=new Date();
  target.setHours(h,m,0,0);
  if(target<=now)target.setDate(target.getDate()+1);
  const delay=target-now;
  const p=getPts(di)[pi];
  const et=getExtraT(di,pi);
  const tname=key.startsWith('t_')?p.tasks[parseInt(key.slice(2))]:et[parseInt(key.slice(2))]||'';
  const mins=Math.round(delay/60000);
  alert(`⏰ Hatırlatıcı kuruldu!\n${p.name} — ${tname}\nSaat: ${time} (${mins} dakika sonra)`);
  setTimeout(()=>{
    try{new Notification('KBB Nöbet — '+p.name,{body:tname,icon:'./icon-192.png',tag:`alarm-${di}-${pi}-${key}`});}
    catch(e){alert('KBB Nöbet\n'+p.name+'\n'+tname);}
  },delay);
}

// ── Add patient ───────────────────────────────────────────────
function openAddPt(di){
  pendAddDay=di;
  ['np-ad','np-op','np-dr'].forEach(id=>document.getElementById(id).value='');

function saveNewPt(){
  const name=document.getElementById('np-ad').value.trim();

// ── Detail ────────────────────────────────────────────────────
function openDet(di,pi){
  const p=getPts(di)[pi];
  document.getElementById('det-name').textContent=(p.name||'')+(p.age?', '+p.age:'')+(p.dr?' — '+p.dr:'');

  document.getElementById('det-muayene').textContent=p.muayene||'—';

// ── PDF ───────────────────────────────────────────────────────
async function handlePdf(event){
  const file=event.target.files[0];if(!file)return;
  const st=document.getElementById('pdfst');
  st.style.display='block';st.className='pst loading';st.textContent='PDF okunuyor...';
  try{
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=()=>rej(new Error('Okunamadı'));r.readAsDataURL(file);});
    document.getElementById('ldtxt').textContent='Ameliyat listesi oluşturuluyor...';
    document.getElementById('ldov').classList.add('open');
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:6000,messages:[{role:'user',content:[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:'KBB ameliyat listesi PDF. Sadece JSON döndür:\n{"weekLabel":"...","days":[{"label":"Pzt 30/3","patients":[{"name":"...","age":32,"dr":"FÖ","op":"...","side":"SOL","ybu":false,"kayit":true,"fotograf":false,"rinomano":false,"lavaj":false,"isaret":true,"kulak":true,"osas":false,"tonsil":false,"fess":false,"boyun":false,"acik":false,"tiroid":false,"paratiroid":false,"benign":false,"totallarenj":false,"muayene":"..."}]}]}\n\nKurallar:\n- Timpanoplasti/Miringoplasti/DSR/DL/Tiroid/Paratiroid/Boyun/LAP→kayit:true\n- Açık teknik septoplasti→fotograf:true,rinomano:true,acik:true\n- Standart septoplasti→rinomano:true\n- DSR→lavaj:true, Kulak am.→kulak:true, OSAS→osas:true\n- Tonsil→tonsil:true, FESS→fess:true, Boyun dis.→boyun:true\n- Tiroid(malign:benign:false, benign:benign:true)→tiroid:true\n- Paratiroid→paratiroid:true, Total larenj→totallarenj:true\n- Sağ/Sol→side+isaret:true, YBÜ→ybu:true\n- dr: son sütundaki doktor kısaltması\n- muayene: PDF muayene notlarının tamamı'}]}]})});
    const data=await resp.json();
    const text=data.content.map(c=>c.text||'').join('');
    const parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
    parsed.days.forEach(d=>d.patients.forEach(p=>{p.tasks=bldTasks(p);}));
    const ns={weekLabel:parsed.weekLabel,checks:parsed.days.map(d=>d.patients.map(p=>p.tasks.map(()=>false))),extraTasks:parsed.days.map(d=>d.patients.map(()=>[])),extraChecks:parsed.days.map(d=>d.patients.map(()=>[])),notes:parsed.days.map(d=>d.patients.map(()=>'')),alarms:parsed.days.map(d=>d.patients.map(()=>({}))),addedPatients:parsed.days.map(()=>[])};
    // Store parsed days separately so BASE can be overridden for PDF weeks
    ns._pdfDays=parsed.days;
    db.ref(FB).set(ns).then(()=>{
      document.getElementById('ldov').classList.remove('open');
      st.className='pst ok';
      st.textContent='✓ '+parsed.weekLabel+' — '+parsed.days.reduce((a,d)=>a+d.patients.length,0)+' hasta yüklendi.';
      curDay=0;closeOv('pdf-ov');
    }).catch(e=>{document.getElementById('ldov').classList.remove('open');st.className='pst err';st.textContent='Kayıt hatası: '+e.message;});
  }catch(e){document.getElementById('ldov').classList.remove('open');st.className='pst err';st.textContent='Hata: '+e.message;}
  event.target.value='';
}

function openOv(id){document.getElementById(id).classList.add('open');}
function closeOv(id){document.getElementById(id).classList.remove('open');pendAlarm=null;}
function reqNotif(){
  if(!('Notification'in window)){alert('Bu tarayıcı bildirimleri desteklemiyor.');return;}
  Notification.requestPermission().then(p=>{
    if(p==='granted')alert('✓ Bildirim izni verildi! Artık hatırlatıcı kurabilirsiniz.');
    else alert('Bildirim izni reddedildi. Tarayıcı ayarlarından izin vermeniz gerekiyor.');
  });
}

if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
renderAll();
initFb();
