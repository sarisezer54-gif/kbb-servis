const LARENJ=["Sulcid 3x2","Mucinac 3x1","Flagyl 3x1","Dengeli 2x1","İlksef 1x2","Ketavel 2x1","Lamelat 1x1","Ulcezol 1x1","Serum 4x1"];

function buildOrders(p){
  const preop=[],extra=[];let postop;
  if(p.totallarenj)return{preop,postop:[...LARENJ],extra};
  const cocuk=p.age!==null&&p.age<=12;
  if(cocuk){postop=[...COCUK];if(p.tonsil)extra.push("Gasvin 1x1");if(p.kulak)extra.push("Zaridinex 3x5 (aynı gün)");return{preop,postop,extra};}
  postop=[...RUTIN];
  if(p.osas){preop.push("Lamelat 1x1");extra.push("Ramadex 100mg 1x1","Dengeli 1x1","Polgyl/Flagyl 3x1");}
  if(p.tonsil)extra.push("Gasvin");
  if(p.fess)postop=postop.map(x=>x.includes("Metadem")?"Paracerol 2x1":x);
  if(p.boyun)extra.push("Flagyl 3x1");
  if(p.acik)extra.push("Cipropol 2x1");
  if(p.kulak)extra.push("Zaridinex 3x5 (aynı gün)");
  if(p.tiroid||p.paratiroid)extra.push("Qalyviz 0.5mg 2x1","Calcimax 1x1");
  if(p.tiroid&&p.benign)extra.push("Levotiron 1x1");
  return{preop,postop,extra};
}

function buildTasks(p){
  const t=["Yatış"];
  if(p.kayit)t.push("Kayıt");
  if(p.fotograf)t.push("Fotoğraf");
  if(p.rinomano)t.push("Rinomanometri");
  if(p.lavaj)t.push("Lavaj Testi");
  if(p.kulak&&p.side)t.push("Saç Tıraşı ("+p.side+")");
  if(p.isaret&&p.side)t.push("Preop İşaret ("+p.side+")");
  t.push("Ameliyat İsteği");
  t.push("Sabah Epikriz & Order");
  return t;
}

let fbData=null;
let currentDay=0;
let pendingAlarm=null;
let pendingAddDay=0;
const FB_PATH='nobet_30mart';

function setSyncDot(s){
  const d=document.getElementById('sync-dot');
  if(d)d.className='sync-dot '+s;
}

function initFirebase(){
  setSyncDot('syncing');
  db.ref(FB_PATH).on('value', snap=>{
    const val=snap.val();
    if(val){
      fbData=val;
      renderAll();
      setSyncDot('synced');
    } else {
      const init={
        weekLabel:'30 Mart – 3 Nisan 2026',
        days:BASE_DAYS.map(d=>({label:d.label,patients:d.patients.map(p=>Object.assign({},p))})),
        checks:BASE_DAYS.map(d=>d.patients.map(p=>p.tasks.map(()=>false))),
        extraTasks:BASE_DAYS.map(d=>d.patients.map(()=>[])),
        extraChecks:BASE_DAYS.map(d=>d.patients.map(()=>[])),
        notes:BASE_DAYS.map(d=>d.patients.map(()=>'')),
        alarms:BASE_DAYS.map(d=>d.patients.map(()=>({}))),
        addedPatients:BASE_DAYS.map(()=>[])
      };
      db.ref(FB_PATH).set(init).then(()=>{fbData=init;renderAll();setSyncDot('synced');}).catch(()=>setSyncDot('error'));
    }
  }, err=>{console.error(err);setSyncDot('error');});
}

function getS(){return fbData||{checks:[],extraTasks:[],extraChecks:[],notes:[],alarms:[],addedPatients:[],days:BASE_DAYS};}

function saveS(s){
  setSyncDot('syncing');
  db.ref(FB_PATH).set(s).then(()=>setSyncDot('synced')).catch(()=>setSyncDot('error'));
}

function cloneS(){return JSON.parse(JSON.stringify(getS()));}

function getDayPatients(di){
  const s=getS();
  const base=((s.days&&s.days[di])?s.days[di].patients:BASE_DAYS[di].patients).map(p=>{const c=Object.assign({},p);if(!c.tasks)c.tasks=buildTasks(c);return c;});
  const added=((s.addedPatients||[])[di]||[]).map(p=>{const c=Object.assign({},p);if(!c.tasks)c.tasks=buildTasks(c);return c;});
  return base.concat(added);
}

function renderAll(){
  const s=getS();
  const dayList=s.days||BASE_DAYS;
  document.getElementById('week-label').textContent=s.weekLabel||'30 Mart – 3 Nisan 2026';
  const tabsC=document.getElementById('tabs-container');
  const daysC=document.getElementById('days-container');
  tabsC.innerHTML='';daysC.innerHTML='';
  dayList.forEach((d,di)=>{
    const tab=document.createElement('div');
    tab.className='tab'+(di===currentDay?' active':'');
    tab.textContent=d.label;
    tab.onclick=()=>switchDay(di);
    tabsC.appendChild(tab);
    const div=document.createElement('div');
    div.id='day-'+di;
    div.className='day'+(di===currentDay?' active':'');
    daysC.appendChild(div);
    renderDay(di);
  });
}

function renderDay(di){
  const s=getS();
  const patients=getDayPatients(di);
  const basePts=(s.days&&s.days[di])?s.days[di].patients:BASE_DAYS[di].patients;
  const baseCount=basePts.length;
  const container=document.getElementById('day-'+di);
  if(!container)return;
  const checks=(s.checks||[])[di]||[];
  const extraTasks=(s.extraTasks||[])[di]||[];
  const extraChecks=(s.extraChecks||[])[di]||[];
  const notes=(s.notes||[])[di]||[];
  const alarms=(s.alarms||[])[di]||[];
  let td=0,tt=0,pd=0,ybu=0;
  patients.forEach((p,i)=>{
    const pt=checks[i]||p.tasks.map(()=>false);
    const et=extraTasks[i]||[];
    const ec=extraChecks[i]||[];
    tt+=pt.length+et.length;
    const done=pt.filter(Boolean).length+ec.filter(Boolean).length;
    td+=done;
    if(done===pt.length+et.length&&pt.length+et.length>0)pd++;
    if(p.ybu)ybu++;
  });
  let html='<div class="summary">'
    +'<div class="metric"><div class="metric-val">'+td+'</div><div class="metric-lbl">tamamlanan</div></div>'
    +'<div class="metric"><div class="metric-val">'+tt+'</div><div class="metric-lbl">toplam görev</div></div>'
    +'<div class="metric"><div class="metric-val">'+pd+'</div><div class="metric-lbl">hazır hasta</div></div>'
    +'<div class="metric ybu-metric"><div class="metric-val">'+ybu+'</div><div class="metric-lbl">YBÜ yeri</div></div>'
    +'</div>';
  if(ybu>0){
    const names=patients.filter(p=>p.ybu).map(p=>p.name.split(' ')[0]).join(', ');
    html+='<div class="ybu-banner">🏥 '+ybu+' YBÜ yeri isteniyor: '+names+'</div>';
  }
  html+='<div class="day-actions"><button class="day-action-btn add" onclick="openAddPatient('+di+')">+ Hasta Ekle</button><button class="day-action-btn" onclick="resetDay('+di+')">Sıfırla</button></div>';
  patients.forEach((p,pi)=>{
    const pt=checks[pi]||p.tasks.map(()=>false);
    const et=extraTasks[pi]||[];
    const ec=extraChecks[pi]||[];
    const note=notes[pi]||'';
    const alarm=alarms[pi]||{};
    const done=pt.filter(Boolean).length+ec.filter(Boolean).length;
    const total=pt.length+et.length;
    const allDone=done===total&&total>0;
    const pct=total>0?Math.round(done/total*100):0;
    const sc=p.side==='SOL'?'sol':p.side==='SAĞ'?'sag':'';
    const sb=p.side?'<span class="badge '+sc+'">'+p.side+'</span>':'';
    const yb=p.ybu?'<span class="badge ybu">Postop YBÜ</span>':'';
    const del=pi>=baseCount?'<button class="del-patient-btn" onclick="deletePatient('+di+','+pi+')">✕</button>':'';
    html+='<div class="patient-card">'
      +'<div class="patient-header"><div class="patient-info">'
      +'<div class="patient-name" style="'+(allDone?'text-decoration:line-through;color:#888780':'')+'">'+(p.name||'')+(p.age?', '+p.age:'')+' '+del+'</div>'
      +'<div class="patient-op">'+(p.op||'')+'</div>'
      +'<div class="patient-meta">'+sb+yb+'</div>'
      +'</div><span class="count-badge">'+done+'/'+total+'</span></div>'
      +'<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'
      +'<div class="tasks">';
    p.tasks.forEach((t,ti)=>{
      const ak='t_'+ti;
      const ha=alarm[ak];
      html+='<div class="task'+(pt[ti]?' done':'')+'" onclick="toggleCheck('+di+','+pi+','+ti+')">'
        +'<input type="checkbox" '+(pt[ti]?'checked':'')+' onclick="event.stopPropagation();toggleCheck('+di+','+pi+','+ti+')">'
        +'<label>'+t+'</label>'
        +(ha?'<span style="font-size:10px;color:#854f0b">⏰'+ha+'</span>':'')
        +'<span style="font-size:11px;color:#ddd;cursor:pointer;margin-left:2px" onclick="event.stopPropagation();openAlarmFor('+di+','+pi+',\''+ak+'\',\''+t.replace(/'/g,"\\'")+'\')" >🔔</span>'
        +'</div>';
    });
    html+='</div>';
    if(et.length>0){
      html+='<div class="extra-tasks">';
      et.forEach((t,eti)=>{
        const ak='e_'+eti;
        const ha=alarm[ak];
        html+='<div class="extra-task'+(ec[eti]?' done':'')+'">'
          +'<input type="checkbox" '+(ec[eti]?'checked':'')+' onclick="toggleExtra('+di+','+pi+','+eti+')">'
          +'<label onclick="toggleExtra('+di+','+pi+','+eti+')">'+t+'</label>'
          +(ha?'<span style="font-size:10px;color:#854f0b">⏰'+ha+'</span>':'')
          +'<span style="font-size:11px;color:#ddd;cursor:pointer" onclick="openAlarmFor('+di+','+pi+',\''+ak+'\',\''+t.replace(/'/g,"\\'")+'\')" >🔔</span>'
          +'<span class="extra-task-del" onclick="deleteExtra('+di+','+pi+','+eti+')">×</span>'
          +'</div>';
      });
      html+='</div>';
    }
    html+='<div class="add-task-row">'
      +'<input class="add-task-input" type="text" id="nt-'+di+'-'+pi+'" placeholder="Ekstra görev ekle..." onkeydown="if(event.key===\'Enter\')addExtra('+di+','+pi+')">'
      +'<button class="add-task-btn" onclick="addExtra('+di+','+pi+')">+</button>'
      +'</div>';
    html+=renderOrders(p);
    html+='<textarea class="note-area" placeholder="Not ekle..." oninput="saveNote('+di+','+pi+',this.value)">'+note+'</textarea>';
    html+='</div>';
  });
  container.innerHTML=html;
}

function renderOrders(p){
  const{preop,postop,extra}=buildOrders(p);
  let h='<div class="orders-section"><div class="orders-title">Orderlar</div>';
  if(preop.length){h+='<div class="orders-group"><div class="orders-group-label">Preop:</div><div class="order-pills">';preop.forEach(o=>{h+='<span class="pill preop">'+o+'</span>';});h+='</div></div>';}
  h+='<div class="orders-group"><div class="orders-group-label">Postop 0. gün:</div><div class="order-pills">';
  postop.forEach(o=>{h+='<span class="pill">'+o+'</span>';});
  extra.forEach(o=>{h+='<span class="pill extra">'+o+'</span>';});
  h+='</div></div></div>';
  return h;
}

function toggleCheck(di,pi,ti){
  const s=cloneS();
  if(!s.checks[di])s.checks[di]=[];
  if(!s.checks[di][pi])s.checks[di][pi]=getDayPatients(di)[pi].tasks.map(()=>false);
  s.checks[di][pi][ti]=!s.checks[di][pi][ti];
  saveS(s);
}

function toggleExtra(di,pi,eti){
  const s=cloneS();
  if(!s.extraChecks[di][pi])s.extraChecks[di][pi]=[];
  s.extraChecks[di][pi][eti]=!s.extraChecks[di][pi][eti];
  saveS(s);
}

function addExtra(di,pi){
  const inp=document.getElementById('nt-'+di+'-'+pi);
  const val=inp.value.trim();if(!val)return;
  const s=cloneS();
  if(!s.extraTasks[di][pi])s.extraTasks[di][pi]=[];
  if(!s.extraChecks[di][pi])s.extraChecks[di][pi]=[];
  s.extraTasks[di][pi].push(val);
  s.extraChecks[di][pi].push(false);
  saveS(s);
}

function deleteExtra(di,pi,eti){
  const s=cloneS();
  s.extraTasks[di][pi].splice(eti,1);
  s.extraChecks[di][pi].splice(eti,1);
  saveS(s);
}

function saveNote(di,pi,val){
  const s=cloneS();
  if(!s.notes[di])s.notes[di]=[];
  s.notes[di][pi]=val;
  saveS(s);
}

function openAlarmFor(di,pi,key,taskName){
  pendingAlarm={di,pi,key};
  document.getElementById('alarm-task-name').value=taskName;
  const al=((getS().alarms||[])[di]||[])[pi]||{};
  document.getElementById('alarm-time').value=al[key]||'';
  openModal('alarm-modal');
}

function saveAlarm(){
  if(!pendingAlarm)return;
  const{di,pi,key}=pendingAlarm;
  const time=document.getElementById('alarm-time').value;
  const s=cloneS();
  if(!s.alarms[di])s.alarms[di]=[];
  if(!s.alarms[di][pi])s.alarms[di][pi]={};
  if(time){s.alarms[di][pi][key]=time;scheduleNotif(di,pi,key,time);}
  else delete s.alarms[di][pi][key];
  saveS(s);closeModal('alarm-modal');
}

function scheduleNotif(di,pi,key,time){
  if(Notification.permission!=='granted')return;
  const[h,m]=time.split(':').map(Number);
  const now=new Date(),target=new Date();
  target.setHours(h,m,0,0);
  if(target<=now)target.setDate(target.getDate()+1);
  const p=getDayPatients(di)[pi];
  const taskIdx=key.startsWith('t_')?parseInt(key.slice(2)):null;
  const extraIdx=key.startsWith('e_')?parseInt(key.slice(2)):null;
  const s=getS();
  const tname=taskIdx!==null?p.tasks[taskIdx]:((s.extraTasks[di]||[])[pi]||[])[extraIdx]||'';
  setTimeout(()=>{try{new Notification('KBB — '+p.name,{body:tname,icon:'./icon-192.png'});}catch(e){}},target-now);
}

function saveNewPatient(){
  const name=document.getElementById('np-name').value.trim();
  const op=document.getElementById('np-op').value.trim();
  if(!name||!op){alert('Ad ve ameliyat zorunludur.');return;}
  const sv=document.getElementById('np-side').value;
  const p={name,op,age:parseInt(document.getElementById('np-age').value)||null,side:sv||null,ybu:document.getElementById('np-ybu').checked,kayit:document.getElementById('np-kayit').checked,fotograf:document.getElementById('np-fotograf').checked,rinomano:document.getElementById('np-rinomano').checked,lavaj:document.getElementById('np-lavaj').checked,isaret:!!sv,kulak:document.getElementById('np-kulak').checked,osas:document.getElementById('np-osas').checked,tonsil:document.getElementById('np-tonsil').checked,fess:document.getElementById('np-fess').checked,boyun:document.getElementById('np-boyun').checked,acik:document.getElementById('np-acik').checked,tiroid:document.getElementById('np-tiroid').checked,paratiroid:document.getElementById('np-paratiroid').checked,benign:document.getElementById('np-benign').checked,totallarenj:document.getElementById('np-totallarenj').checked};
  p.tasks=buildTasks(p);
  const s=cloneS();
  if(!s.addedPatients[pendingAddDay])s.addedPatients[pendingAddDay]=[];

  s.checks[pendingAddDay].push(p.tasks.map(()=>false));
  s.extraTasks[pendingAddDay].push([]);
  s.extraChecks[pendingAddDay].push([]);
  s.notes[pendingAddDay].push('');
  s.alarms[pendingAddDay].push({});
  saveS(s);closeModal('add-patient-modal');
}

function deletePatient(di,pi){
  if(!confirm('Bu hasta silinsin mi?'))return;
  const s=cloneS();
  const bp=(s.days&&s.days[di])?s.days[di].patients:BASE_DAYS[di].patients;
  s.addedPatients[di].splice(pi-bp.length,1);
  s.checks[di].splice(pi,1);s.extraTasks[di].splice(pi,1);s.extraChecks[di].splice(pi,1);s.notes[di].splice(pi,1);s.alarms[di].splice(pi,1);
  saveS(s);
}

function resetDay(di){
  if(!confirm('Bu gün sıfırlansın mı?'))return;
  const s=cloneS();
  const bp=(s.days&&s.days[di])?s.days[di].patients:BASE_DAYS[di].patients;
  const emptyChecks=bp.map(p=>{const c=Object.assign({},p);if(!c.tasks)c.tasks=buildTasks(c);return c.tasks.map(()=>false);});
  db.ref(FB_PATH+'/checks/'+di).set(emptyChecks);
  db.ref(FB_PATH+'/extraTasks/'+di).set(null);
  db.ref(FB_PATH+'/extraChecks/'+di).set(null);
  db.ref(FB_PATH+'/notes/'+di).set(null);
  db.ref(FB_PATH+'/alarms/'+di).set(null);
  db.ref(FB_PATH+'/addedPatients/'+di).set(null);
}

function switchDay(di){
  currentDay=di;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===di));

    const parsed=JSON.parse(clean);
    parsed.days.forEach(d=>d.patients.forEach(p=>{p.tasks=buildTasks(p);}));
    const newState={weekLabel:parsed.weekLabel||'Yeni Hafta',days:parsed.days,checks:parsed.days.map(d=>d.patients.map(p=>p.tasks.map(()=>false))),extraTasks:parsed.days.map(d=>d.patients.map(()=>[])),extraChecks:parsed.days.map(d=>d.patients.map(()=>[])),notes:parsed.days.map(d=>d.patients.map(()=>'')),alarms:parsed.days.map(d=>d.patients.map(()=>({}))),addedPatients:parsed.days.map(()=>[])};
    db.ref(FB_PATH).set(newState).then(()=>{
      document.getElementById('loading-overlay').classList.remove('open');
      statusEl.className='pdf-status success';
      statusEl.textContent='✓ '+parsed.weekLabel+' oluşturuldu! '+parsed.days.reduce((a,d)=>a+d.patients.length,0)+' hasta yüklendi.';
      currentDay=0;
      closeModal('pdf-modal');
    }).catch(e=>{document.getElementById('loading-overlay').classList.remove('open');statusEl.className='pdf-status error';statusEl.textContent='Kayıt hatası: '+e.message;});
  }catch(e){
    document.getElementById('loading-overlay').classList.remove('open');
    statusEl.className='pdf-status error';statusEl.textContent='Hata: '+e.message;
  }
  event.target.value='';
}

if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});

// Init - render first then connect Firebase
renderAll();
initFirebase();
</script>
</body>
</html>
